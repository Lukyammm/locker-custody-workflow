<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — Mapa Visual de Armários</title>
<style>
  :root {
    --livre:       #5BA98C;
    --em-uso:      #4F6F97;
    --proximo:     #C67B2A;
    --vencido:     #8B1E3A;
    --bg:          #0F172A;
    --surface:     #1E293B;
    --surface2:    #273348;
    --border:      rgba(255,255,255,0.08);
    --text:        #E2E8F0;
    --muted:       #94A3B8;
    --radius:      14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .topbar-title {
    font-size: 1.5rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar-title span { color: var(--muted); font-weight: 400; font-size: 1rem; }

  /* ── KPI cards ── */
  .kpis {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
  }
  .kpi-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .kpi-num { font-weight: 700; font-size: 1.1rem; }
  .kpi-label { color: var(--muted); font-size: 0.78rem; }

  /* ── Filters row ── */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    transition: all 0.18s;
  }
  .filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .filter-btn.active { background: var(--livre); color: #fff; border-color: transparent; }
  .filter-btn.em-uso.active  { background: var(--em-uso); }
  .filter-btn.proximo.active { background: var(--proximo); }
  .filter-btn.vencido.active { background: var(--vencido); }

  .search-input {
    margin-left: auto;
    padding: 7px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
    width: 180px;
    transition: border-color 0.18s;
  }
  .search-input:focus { border-color: rgba(255,255,255,0.25); }
  .search-input::placeholder { color: var(--muted); }

  /* ── Setor label ── */
  .setor-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .setor-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Locker Grid ── */
  .locker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 10px;
  }

  .locker-cell {
    aspect-ratio: 3/4;
    border-radius: var(--radius);
    border: 2px solid transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    user-select: none;
    overflow: hidden;
  }
  .locker-cell::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0.12;
  }
  .locker-cell:hover {
    transform: translateY(-4px) scale(1.04);
    z-index: 2;
  }

  /* Status colors */
  .locker-cell.livre {
    background: linear-gradient(160deg, #1a3d2f 0%, #0f2820 100%);
    border-color: rgba(91, 169, 140, 0.35);
    box-shadow: 0 4px 20px rgba(91, 169, 140, 0.15);
  }
  .locker-cell.livre:hover {
    border-color: var(--livre);
    box-shadow: 0 8px 28px rgba(91, 169, 140, 0.35);
  }
  .locker-cell.em-uso {
    background: linear-gradient(160deg, #1a2a3d 0%, #0f1d2d 100%);
    border-color: rgba(79, 111, 151, 0.35);
    box-shadow: 0 4px 20px rgba(79, 111, 151, 0.12);
  }
  .locker-cell.em-uso:hover {
    border-color: var(--em-uso);
    box-shadow: 0 8px 28px rgba(79, 111, 151, 0.35);
  }
  .locker-cell.proximo {
    background: linear-gradient(160deg, #3d2a0f 0%, #271a07 100%);
    border-color: rgba(198, 123, 42, 0.45);
    box-shadow: 0 4px 20px rgba(198, 123, 42, 0.18);
  }
  .locker-cell.proximo:hover {
    border-color: var(--proximo);
    box-shadow: 0 8px 28px rgba(198, 123, 42, 0.4);
  }
  .locker-cell.vencido {
    background: linear-gradient(160deg, #3d0f1a 0%, #27080f 100%);
    border-color: rgba(139, 30, 58, 0.55);
    box-shadow: 0 4px 20px rgba(139, 30, 58, 0.25);
  }
  .locker-cell.vencido:hover {
    border-color: var(--vencido);
    box-shadow: 0 8px 28px rgba(139, 30, 58, 0.5);
  }

  /* Status strip (top) */
  .locker-strip {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 4px 4px 0 0;
  }
  .livre    .locker-strip { background: var(--livre); }
  .em-uso   .locker-strip { background: var(--em-uso); }
  .proximo  .locker-strip { background: var(--proximo); }
  .vencido  .locker-strip { background: var(--vencido); }

  /* Lock icon */
  .locker-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.95rem;
  }
  .livre   .locker-icon { background: rgba(91,169,140,0.18); color: var(--livre); }
  .em-uso  .locker-icon { background: rgba(79,111,151,0.18); color: #7aaed4; }
  .proximo .locker-icon { background: rgba(198,123,42,0.18); color: var(--proximo); }
  .vencido .locker-icon { background: rgba(139,30,58,0.18);  color: #e05070; }

  .locker-num {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .locker-name {
    font-size: 0.64rem;
    color: var(--muted);
    text-align: center;
    padding: 0 6px;
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .locker-badge {
    position: absolute;
    top: 8px; right: 8px;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 6px;
    letter-spacing: 0.04em;
  }
  .proximo .locker-badge { background: rgba(198,123,42,0.25); color: #f4a261; }
  .vencido .locker-badge { background: rgba(139,30,58,0.3);   color: #f87171; }

  /* Pulse for vencido */
  .vencido .locker-strip {
    animation: pulse-strip 1.8s ease-in-out infinite;
  }
  @keyframes pulse-strip {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* ── Tooltip / Detail panel ── */
  .detail-panel {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 300px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .detail-panel.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .detail-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .detail-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
  }
  .detail-title { font-weight: 700; font-size: 1rem; }
  .detail-sub   { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .detail-rows  { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .detail-row {
    display: flex; justify-content: space-between;
    font-size: 0.83rem;
    padding: 8px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
  }
  .detail-row-label { color: var(--muted); }
  .detail-row-val   { font-weight: 600; }
  .detail-actions { display: flex; gap: 8px; }
  .detail-btn {
    flex: 1;
    padding: 9px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.8rem;
    transition: filter 0.15s;
  }
  .detail-btn:hover { filter: brightness(1.1); }
  .detail-btn.primary { background: var(--em-uso); color: #fff; }
  .detail-btn.secondary {
    background: rgba(255,255,255,0.07);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-top: 28px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 0.78rem; color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot  { width: 9px; height: 9px; border-radius: 50%; }

  /* ── Annotation ── */
  .annotation {
    position: fixed;
    top: 24px; right: 24px;
    background: rgba(91,169,140,0.12);
    border: 1px solid rgba(91,169,140,0.3);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 0.78rem;
    color: #7dd3b8;
    max-width: 220px;
    line-height: 1.4;
  }
</style>
</head>
<body>

<div class="annotation">
  💡 <strong>Mockup interativo</strong><br>
  Passe o mouse sobre um armário para ver o painel de detalhes
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-title">
    🗺️ Mapa de Armários <span>Unidade: UTI Adulto</span>
  </div>
  <div class="kpis">
    <div class="kpi">
      <div class="kpi-dot" style="background:var(--livre)"></div>
      <div><div class="kpi-num">18</div><div class="kpi-label">Livres</div></div>
    </div>
    <div class="kpi">
      <div class="kpi-dot" style="background:var(--em-uso)"></div>
      <div><div class="kpi-num">24</div><div class="kpi-label">Em uso</div></div>
    </div>
    <div class="kpi">
      <div class="kpi-dot" style="background:var(--proximo)"></div>
      <div><div class="kpi-num">5</div><div class="kpi-label">Próx. venc.</div></div>
    </div>
    <div class="kpi">
      <div class="kpi-dot" style="background:var(--vencido)"></div>
      <div><div class="kpi-num">3</div><div class="kpi-label">Vencidos</div></div>
    </div>
  </div>
</div>

<!-- Filters -->
<div class="filters">
  <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
  <button class="filter-btn livre"   onclick="setFilter('livre',this)">🟢 Livres</button>
  <button class="filter-btn em-uso"  onclick="setFilter('em-uso',this)">🔵 Em uso</button>
  <button class="filter-btn proximo" onclick="setFilter('proximo',this)">🟠 Próximos</button>
  <button class="filter-btn vencido" onclick="setFilter('vencido',this)">🔴 Vencidos</button>
  <input class="search-input" type="text" placeholder="🔍  Buscar armário ou nome..." oninput="handleSearch(this.value)">
</div>

<!-- Grid Setor A -->
<div class="setor-label">Setor A — Corredor Principal</div>
<div class="locker-grid" id="grid-a"></div>

<!-- Grid Setor B -->
<div class="setor-label">Setor B — Ala Norte</div>
<div class="locker-grid" id="grid-b"></div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div class="detail-icon" id="detail-icon"></div>
    <div>
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-sub"  id="detail-sub"></div>
    </div>
  </div>
  <div class="detail-rows" id="detail-rows"></div>
  <div class="detail-actions" id="detail-actions"></div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--livre)"></div> Livre</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--em-uso)"></div> Em uso</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--proximo)"></div> Próximo do vencimento (&lt;3 dias)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--vencido)"></div> Vencido (pulsa)</div>
</div>

<script>
const nomes = ['João S.','Maria L.','Pedro A.','Ana C.','Carlos M.','Fernanda T.','Lucas B.','Patrícia R.','Marcos V.','Juliana F.','Roberto K.','Sônia D.','Thiago N.','Beatriz O.','Henrique P.'];
const setores = ['A','B','C','D'];

function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randomInt(a,b)  { return Math.floor(Math.random()*(b-a+1))+a; }

function gerarArmarios(setor, qtd, startNum) {
  const statuses = ['livre','livre','livre','em-uso','em-uso','em-uso','em-uso','proximo','vencido'];
  return Array.from({length: qtd}, (_,i) => {
    const num = startNum + i;
    const status = statuses[Math.floor(Math.random() * statuses.length)];
    const nome = status !== 'livre' ? randomItem(nomes) : null;
    const dias = status === 'proximo' ? randomInt(1,2) : status === 'vencido' ? randomInt(1,5) : status === 'em-uso' ? randomInt(3,30) : null;
    return { id: `${setor}${String(num).padStart(2,'0')}`, setor, num, status, nome, dias };
  });
}

const armariosA = gerarArmarios('A', 20, 1);
const armariosB = gerarArmarios('B', 16, 1);

let filtroAtivo = 'todos';
let buscaAtiva  = '';

function renderGrid(container, armarios) {
  container.innerHTML = '';
  const filtered = armarios.filter(a => {
    if (filtroAtivo !== 'todos' && a.status !== filtroAtivo) return false;
    if (buscaAtiva && !a.id.toLowerCase().includes(buscaAtiva) && !(a.nome||'').toLowerCase().includes(buscaAtiva)) return false;
    return true;
  });

  filtered.forEach(a => {
    const cell = document.createElement('div');
    cell.className = `locker-cell ${a.status}`;
    cell.dataset.id = a.id;

    const icons = { livre:'🔓', 'em-uso':'🔒', proximo:'⚠️', vencido:'🚨' };
    const badgeMap = { proximo: `${a.dias}d`, vencido: `+${a.dias}d` };

    cell.innerHTML = `
      <div class="locker-strip"></div>
      <div class="locker-icon">${icons[a.status]}</div>
      <div class="locker-num">${a.id}</div>
      <div class="locker-name">${a.nome || '— livre —'}</div>
      ${badgeMap[a.status] ? `<div class="locker-badge">${badgeMap[a.status]}</div>` : ''}
    `;

    cell.addEventListener('mouseenter', () => showDetail(a));
    cell.addEventListener('mouseleave', () => {
      setTimeout(() => {
        if (!document.querySelector('.detail-panel:hover')) hideDetail();
      }, 120);
    });
    container.appendChild(cell);
  });

  if (!filtered.length) {
    container.innerHTML = `<div style="color:var(--muted);font-size:0.85rem;padding:20px;grid-column:1/-1">Nenhum armário encontrado</div>`;
  }
}

const colorsMap = {
  livre:   { bg:'rgba(91,169,140,0.15)', color:'var(--livre)' },
  'em-uso':{ bg:'rgba(79,111,151,0.15)', color:'#7aaed4' },
  proximo: { bg:'rgba(198,123,42,0.15)', color:'var(--proximo)' },
  vencido: { bg:'rgba(139,30,58,0.2)',   color:'#e05070' },
};
const statusLabels = { livre:'Livre', 'em-uso':'Em uso', proximo:'Próximo venc.', vencido:'Vencido' };
const actionsMap = {
  livre:   [['Registrar uso','primary'],['Ver histórico','secondary']],
  'em-uso':[['Devolver','primary'],['Transferir','secondary']],
  proximo: [['Renovar','primary'],['Devolver','secondary']],
  vencido: [['Regularizar','primary'],['Contatar','secondary']],
};

function showDetail(a) {
  const panel = document.getElementById('detail-panel');
  const c = colorsMap[a.status];

  document.getElementById('detail-icon').style.cssText = `background:${c.bg};color:${c.color}`;
  document.getElementById('detail-icon').textContent = a.status === 'livre' ? '🔓' : a.status === 'vencido' ? '🚨' : a.status === 'proximo' ? '⚠️' : '🔒';
  document.getElementById('detail-title').textContent = `Armário ${a.id}`;
  document.getElementById('detail-sub').textContent = `Setor ${a.setor} • ${statusLabels[a.status]}`;

  const rows = [
    ['Usuário', a.nome || '—'],
    ['Status', statusLabels[a.status]],
    ['Dias restantes', a.dias != null ? (a.status === 'vencido' ? `Vencido há ${a.dias}d` : `${a.dias} dias`) : '—'],
    ['Setor', `Setor ${a.setor}`],
  ];
  document.getElementById('detail-rows').innerHTML = rows.map(([l,v]) =>
    `<div class="detail-row"><span class="detail-row-label">${l}</span><span class="detail-row-val">${v}</span></div>`
  ).join('');

  document.getElementById('detail-actions').innerHTML = actionsMap[a.status].map(([label,cls]) =>
    `<button class="detail-btn ${cls}">${label}</button>`
  ).join('');

  panel.classList.add('visible');
}

function hideDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
}

document.getElementById('detail-panel').addEventListener('mouseleave', hideDetail);

function setFilter(f, btn) {
  filtroAtivo = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function handleSearch(val) {
  buscaAtiva = val.toLowerCase().trim();
  render();
}

function render() {
  renderGrid(document.getElementById('grid-a'), armariosA);
  renderGrid(document.getElementById('grid-b'), armariosB);
}

render();
</script>
</body>
</html>
