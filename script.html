            if (!assinaturaFinal || !assinaturaFinal.assinatura?.base64) {
                mostrarAviso('Liberação cancelada: a assinatura de encerramento não foi coletada. O armário permanecerá ativo.');
                return;
            }

            const metodo = 'assinatura';
            const confirmacao = '';
            let mensagemSucesso = 'Termo finalizado e armário liberado com sucesso';
            const usuarioResponsavel = obterDescricaoResponsavelAtual();
            const snapshotArmario = clonarArmario(armario);
            const dadosConfirmacao = {
                idInterface: armario.id,
                idPlanilha: identificadores?.idPlanilha || '',
                tipo: identificadores?.tipo || ''
            };
            let liberacaoConfirmada = false;

            const notificarProcessamentoEmSegundoPlano = () => {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'info',
                    title: 'Liberação iniciada',
                    text: 'Processando em segundo plano...',
                    showConfirmButton: false,
                    timer: 1800,
                    timerProgressBar: true,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });
            };

            const executarLiberacaoAssincrona = async () => {
                try {
                    const detectarErroTermoNaoEncontrado = (mensagem) => {
                        if (!mensagem) return false;
                        const texto = mensagem.toString().toLowerCase();
                        const textoSemAcento = texto.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                        return texto.includes('termo não localizado') || textoSemAcento.includes('termo nao localizado');
                    };

                    const resultadoUnificado = await callGoogleScript('finalizarELiberarArmario', {
                        armarioId: identificadores?.idPlanilha || '',
                        numeroArmario: identificadores?.numeroArmario || '',
                        metodo,
                        assinaturaFinal: assinaturaFinal.assinatura.base64,
                        assinaturaMimeFinal: assinaturaFinal.assinatura.mime,
                        fotoEntregaBase64: assinaturaFinal.fotoBase64,
                        fotoEntregaMime: assinaturaFinal.fotoMime,
                        confirmacao,
                        usuarioResponsavel,
                        tipo: identificadores?.tipo || ''
                    });

                    const finalizacao = resultadoUnificado?.finalizacao || {};
                    const liberacao = resultadoUnificado?.liberacao || {};
                    const termoNaoLocalizado = resultadoUnificado?.termoNaoLocalizado
                        || detectarErroTermoNaoEncontrado(finalizacao.error || resultadoUnificado?.error);

                    if (!resultadoUnificado || !resultadoUnificado.success) {
                        if (resultadoUnificado?.etapa === 'finalizacao' && termoNaoLocalizado) {
                            mensagemSucesso = 'Armário liberado com sucesso. Termo não localizado para finalização.';
                        } else {
                            notificarErroPadrao(resultadoUnificado || { success: false, error: 'Erro ao finalizar e liberar armário' });
                            return;
                        }
                    }

                    if (!liberacao.success) {
                        notificarErroPadrao(liberacao, 'Não foi possível liberar o armário.');
                        return;
                    }

                    if (!finalizacao.success && termoNaoLocalizado) {
                        mensagemSucesso = 'Armário liberado com sucesso. Termo não localizado para finalização.';
                    }

                    const persistiu = await confirmarLiberacaoPersistida(dadosConfirmacao);
                    liberacaoConfirmada = true;

                    if (!persistiu) {
                        console.warn('Liberação processada no backend, mas a confirmação imediata ainda não refletiu na consulta.');
                    }

                    garantirArmarioLiberadoLocal(id, metodo, confirmacao);
                    atualizarResumoDashboardLocal();
                    atualizarInterface();
                    carregarDadosTabelas({ recarregarArmarios: false }).catch(erro => {
                        console.error('Erro ao atualizar tabelas após encerramento:', erro);
                    });

                    const tarefaAtualizacao = atualizarDadosPosOperacao('Atualizando status do armário...', null, {
                        modoRapido: true,
                        timeoutRapido: 350
                    }).catch(erroAtualizacao => {
                        console.error('Erro ao atualizar dados pós-liberação:', erroAtualizacao);
                    });

                    mostrarSucesso(mensagemSucesso);
                    await tarefaAtualizacao;
                } catch (erro) {
                    console.error('Erro ao liberar armário de acompanhante:', erro);
                    mostrarErro('Não foi possível concluir a liberação. Tente novamente.');
                } finally {
                    if (!liberacaoConfirmada && snapshotArmario) {
                        restaurarArmarioLocal(id, snapshotArmario);
                    }
                }
            };

            const atualizouLocal = garantirArmarioLiberadoLocal(id, metodo, confirmacao);
            if (atualizouLocal) {
                atualizarDashboardImediato();
                carregarDadosTabelas({ recarregarArmarios: false }).catch(erro => {
                    console.error('Erro ao atualizar tabelas localmente após liberação:', erro);
                });
            }
            notificarProcessamentoEmSegundoPlano();
            executarLiberacaoAssincrona();
        }
        // Atualizar painel de notificações
        function renderizarPainelNotificacoes() {
            if (!elementos.notificationPanel) {
                return;
            }
            const notificationList = elementos.notificationPanel.querySelector('.notification-list');
            if (!notificationList) {
                return;
            }
            notificationList.innerHTML = '';

            estado.notificacoes.forEach(notificacao => {
                const item = document.createElement('div');
                item.className = 'notification-item';

                item.innerHTML = `
                    <div class="notification-icon ${notificacao.tipo}">
                        <i class="fas ${notificacao.tipo === 'danger' ? 'fa-exclamation' : 'fa-clock'}"></i>
                    </div>
                    <div class="notification-content">
                        <div class="notification-title">${notificacao.titulo}</div>
                        <div class="notification-time">${notificacao.tempo}</div>
                    </div>
                `;

                notificationList.appendChild(item);
            });
        }
       
        // Funções globais para uso nos eventos HTML
        window.abrirModalArmario = abrirModalArmario;
        window.liberarArmario = liberarArmario;
        window.usarArmario = usarArmario;
        window.abrirTermoDireto = abrirTermoDireto;
        window.abrirMovimentacoes = abrirMovimentacoes;
    </script>
