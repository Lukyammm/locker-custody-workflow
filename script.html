        let armazenamentoLocalDisponivel;
        function removerRascunhoChave(chave) {
            const storage = obterArmazenamentoLocal();
            if (!storage) return;
            try {
                storage.removeItem(chave);
            } catch (erro) {
                console.warn('Falha ao limpar rascunho local:', erro);
            }
        }
        function obterArmazenamentoLocal() {
            if (armazenamentoLocalDisponivel !== undefined) {
                return armazenamentoLocalDisponivel;
            }
            try {
                if (typeof window !== 'undefined' && window.localStorage) {
                    const chaveTeste = '__locknac_sessao_teste__';
                    window.localStorage.setItem(chaveTeste, '1');
                    window.localStorage.removeItem(chaveTeste);
                    armazenamentoLocalDisponivel = window.localStorage;
                    return armazenamentoLocalDisponivel;
                }
            } catch (erro) {
                console.warn('Armazenamento local indisponível:', erro);
            }
            armazenamentoLocalDisponivel = null;
            return armazenamentoLocalDisponivel;
        }
        function obterTemaPreferido() {
            const storage = obterArmazenamentoLocal();
            if (storage) {
                try {
                    const temaSalvo = storage.getItem(STORAGE_KEYS.tema);
                    if (temaSalvo === 'dark' || temaSalvo === 'light') {
                        return temaSalvo;
                    }
                } catch (erro) {
                    console.warn('Falha ao ler tema salvo:', erro);
                }
            }
            return 'light';
        }
        function obterProximoTema(temaAtual) {
            const ordem = ['light', 'dark'];
            const indiceAtual = ordem.indexOf(temaAtual);
            if (indiceAtual === -1) return 'light';
            return ordem[(indiceAtual + 1) % ordem.length];
        }
        function atualizarBotaoTema(tema) {
            const botaoTema = document.getElementById('theme-toggle');
            if (!botaoTema) return;
            const icone = botaoTema.querySelector('i');
            const temasValidos = ['dark'];
            const temaAtual = temasValidos.indexOf(tema) !== -1 ? tema : 'light';
            const proximoTema = obterProximoTema(temaAtual);
            const labelMap = {
                light: 'Ativar tema escuro',
                dark: 'Ativar tema claro'
            };
            const iconMap = {
                light: 'fas fa-sun',
                dark: 'fas fa-moon'
            };
            if (icone) {
                icone.className = iconMap[temaAtual] || 'fas fa-moon';
            }
            botaoTema.setAttribute('aria-label', labelMap[temaAtual] || 'Alternar tema');
            botaoTema.setAttribute('aria-pressed', temaAtual !== 'light' ? 'true' : 'false');
            botaoTema.dataset.nextTheme = proximoTema;
        }
        function aplicarTema(tema, salvarPreferencia = true) {
            const temasValidos = ['dark'];
            const temaFinal = temasValidos.indexOf(tema) !== -1 ? tema : 'light';
            document.documentElement.setAttribute('data-theme', temaFinal);
            atualizarBotaoTema(temaFinal);
            if (!salvarPreferencia) return;
            const storage = obterArmazenamentoLocal();
            if (!storage) return;
            try {
                storage.setItem(STORAGE_KEYS.tema, temaFinal);
            } catch (erro) {
                console.warn('Falha ao salvar tema:', erro);
            }
        }
        function inicializarTema() {
            const temaSalvo = obterTemaPreferido();
            aplicarTema(temaSalvo, false);
            const botaoTema = document.getElementById('theme-toggle');
            if (botaoTema) {
                botaoTema.addEventListener('click', () => {
                    const temaAtual = document.documentElement.getAttribute('data-theme') || 'light';
                    const proximoTema = obterProximoTema(temaAtual);
                    aplicarTema(proximoTema, true);
                });
            }
        }
        function salvarSessaoUsuario(usuario) {
            const storage = obterArmazenamentoLocal();
            if (!storage) return;
            try {
                const dados = {
                    usuario,
                    atualizadoEm: Date.now()
                };
                storage.setItem(STORAGE_KEYS.sessaoUsuario, JSON.stringify(dados));
            } catch (erro) {
                console.warn('Não foi possível salvar a sessão do usuário:', erro);
            }
        }
        function restaurarSessaoUsuario() {
            const storage = obterArmazenamentoLocal();
            if (!storage) return null;
            try {
                const dadosBrutos = storage.getItem(STORAGE_KEYS.sessaoUsuario);
                if (!dadosBrutos) {
                    return null;
                }
                const dados = JSON.parse(dadosBrutos);
                if (!dados || !dados.usuario) {
                    return null;
                }
                if (dados.atualizadoEm && (Date.now() - dados.atualizadoEm) > SESSAO_TTL_MS) {
                    storage.removeItem(STORAGE_KEYS.sessaoUsuario);
                    return null;
                }
                return dados.usuario;
            } catch (erro) {
                console.warn('Falha ao restaurar sessão do usuário:', erro);
                try {
                    storage.removeItem(STORAGE_KEYS.sessaoUsuario);
                } catch (erroRemocao) {
                    console.warn('Não foi possível limpar sessão inválida:', erroRemocao);
                }
                return null;
            }
        }
        function limparSessaoUsuario() {
            const storage = obterArmazenamentoLocal();
            if (!storage) return;
            try {
                storage.removeItem(STORAGE_KEYS.sessaoUsuario);
            } catch (erro) {
                console.warn('Não foi possível limpar a sessão do usuário:', erro);
            }
        }
        function persistirSessaoAtual() {
            if (estado.autenticado && estado.usuarioAutenticado) {
                const usuarioAtual = {
                    ...estado.usuarioAutenticado,
                    unidades: normalizarListaDeUnidades(estado.usuarioAutenticado.unidades)
                };
                salvarSessaoUsuario(usuarioAtual);
            } else {
                limparSessaoUsuario();
            }
        }
        function salvarPreferenciasCabecalho() {
            const storage = obterArmazenamentoLocal();
            if (!storage) return;
            try {
                const perfil = (estado.perfilAtual || 'geral').toString().trim();
                const unidade = (estado.unidadeAtual || 'todas').toString().trim();
                storage.setItem(STORAGE_KEYS.preferenciasCabecalho, JSON.stringify({
                    perfil,
                    unidade,
                    atualizadoEm: Date.now()
                }));
            } catch (erro) {
                console.warn('Não foi possível salvar as preferências de seleção:', erro);
            }
        }
        function restaurarPreferenciasCabecalho() {
            const storage = obterArmazenamentoLocal();
            if (!storage) return null;
            try {
                const bruto = storage.getItem(STORAGE_KEYS.preferenciasCabecalho);
                if (!bruto) return null;
                const dados = JSON.parse(bruto);
                const perfilNormalizado = normalizarTexto(dados?.perfil) || 'geral';
                const perfilPermitido = ['geral', 'visitante', 'acompanhante'].includes(perfilNormalizado)
                    ? perfilNormalizado
                    : 'geral';
                const unidade = (dados?.unidade || '').toString().trim();
                return {
                    perfil: perfilPermitido,
                    unidade: unidade || 'todas'
                };
            } catch (erro) {
                console.warn('Falha ao restaurar preferências de seleção:', erro);
                try {
                    storage.removeItem(STORAGE_KEYS.preferenciasCabecalho);
                } catch (erroRemocao) {
                    console.warn('Não foi possível limpar preferências inválidas:', erroRemocao);
                }
                return null;
            }
        }

        function popularAvataresPadrao() {
            if (!elementos.avatarOptions) {
                return;
            }
            elementos.avatarOptions.innerHTML = '';
            AVATAR_OPTIONS.forEach(option => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'avatar-option';
                button.dataset.avatarId = option.id;
                button.dataset.avatarUrl = option.url ? option.url.toString() : '';
                button.setAttribute('aria-label', option.label);
                button.setAttribute('role', 'option');
                button.setAttribute('aria-selected', 'false');
                if (option.url) {
                    const img = document.createElement('img');
                    img.src = option.url;
                    img.alt = option.label;
                    img.loading = 'lazy';
                    button.appendChild(img);
                } else {
                    const span = document.createElement('span');
                    span.textContent = option.initials || '';
                    if (option.background) {
                        span.style.background = option.background;
                    }
                    if (option.textColor) {
                        span.style.color = option.textColor;
                    }
                    button.appendChild(span);
                }
                elementos.avatarOptions.appendChild(button);
            });
        }
        function obterAvatarAtualUrl() {
            const usuario = obterUsuarioAutenticado();
            return usuario && usuario.avatarUrl ? usuario.avatarUrl.toString().trim() : '';
        }
        function sincronizarSelecaoAvatar() {
            if (!elementos.avatarOptions) {
                return;
            }
            const atual = obterAvatarAtualUrl();
            const botoes = elementos.avatarOptions.querySelectorAll('.avatar-option');
            botoes.forEach(botao => {
                const valor = botao.dataset.avatarUrl || '';
                const selecionado = valor ? valor === atual : !atual;
                botao.classList.toggle('selected', selecionado);
                botao.setAttribute('aria-selected', selecionado ? 'true' : 'false');
            });
        }
        function avatarModalAberto() {
            return elementos.avatarModal && !elementos.avatarModal.classList.contains('hidden');
        }
        function abrirModalAvatar() {
            if (!elementos.avatarModal || !elementos.avatarModalBackdrop) {
                return;
            }
            garantirPortaisCabecalho();
            if (!avatarModalAberto()) {
                travaRolagem.aplicar();
            }
            elementos.avatarModalBackdrop.classList.remove('hidden');
            elementos.avatarModal.classList.remove('hidden');
            elementos.avatarModalBackdrop.setAttribute('aria-hidden', 'false');
            if (elementos.headerUserProfile) {
                elementos.headerUserProfile.setAttribute('aria-expanded', 'true');
            }
            sincronizarSelecaoAvatar();
            requestAnimationFrame(() => {
                const selecionado = elementos.avatarOptions?.querySelector('.avatar-option.selected');
                const alvo = selecionado || elementos.avatarOptions?.querySelector('.avatar-option');
                alvo?.focus();
            });
        }
        function fecharModalAvatar({ focusTrigger = true } = {}) {
            if (!elementos.avatarModal || !elementos.avatarModalBackdrop) {
                return;
            }
            if (avatarModalAberto()) {
                travaRolagem.remover();
            }
            elementos.avatarModal.classList.add('hidden');
            elementos.avatarModalBackdrop.classList.add('hidden');
            elementos.avatarModalBackdrop.setAttribute('aria-hidden', 'true');
            if (elementos.headerUserProfile) {
                elementos.headerUserProfile.setAttribute('aria-expanded', 'false');
                if (focusTrigger) {
                    elementos.headerUserProfile.focus();
                }
            }
            if (elementos.avatarUrlInput) {
                elementos.avatarUrlInput.value = '';
                elementos.avatarUrlInput.classList.remove('invalid');
                elementos.avatarUrlInput.removeAttribute('aria-invalid');
            }

            const deveAbrir = Boolean(aberto);
            elementos.notificationPanel.classList.toggle('is-open', deveAbrir);
            elementos.notificationPanel.setAttribute('aria-hidden', deveAbrir ? 'false' : 'true');
            if (elementos.notificationBell) {
                elementos.notificationBell.setAttribute('aria-expanded', deveAbrir ? 'true' : 'false');
            }
        }

        }
        function aplicarAvatarUsuario(url) {
            if (!estado.autenticado || !estado.usuarioAutenticado) {
                fecharModalAvatar({ focusTrigger: false });
                return;
            }
            const normalizado = (url || '').toString().trim();
            if (normalizado) {
                estado.usuarioAutenticado.avatarUrl = normalizado;
            } else if (estado.usuarioAutenticado.avatarUrl) {
                delete estado.usuarioAutenticado.avatarUrl;
            }
            atualizarCabecalhoUsuario();
            persistirSessaoAtual();
            sincronizarSelecaoAvatar();
            fecharModalAvatar();
        }
        function aplicarAvatarPersonalizado() {
            if (!elementos.avatarUrlInput) {
                return;
            }
            const valor = elementos.avatarUrlInput.value.trim();
            if (!valor) {
                elementos.avatarUrlInput.classList.add('invalid');
                elementos.avatarUrlInput.setAttribute('aria-invalid', 'true');
                elementos.avatarUrlInput.focus();
                return;
            }
            try {
                const urlValida = new URL(valor);
                elementos.avatarUrlInput.classList.remove('invalid');
                elementos.avatarUrlInput.removeAttribute('aria-invalid');
                const urlFinal = urlValida.toString();
                elementos.avatarUrlInput.value = '';
                aplicarAvatarUsuario(urlFinal);

        class GerenciadorCartoesTabela {
            constructor(mediaQueryString = '(max-width: 1024px)') {
                this.mediaQuery = window.matchMedia(mediaQueryString);
                this.adapters = new Map();
            }
            registrar(tabela, config = {}) {
                if (!tabela || this.adapters.has(tabela)) return null;
                const adaptador = new AdaptadorTabelaResponsiva(tabela, config, this.mediaQuery);
                adaptador.inicializar();
                this.adapters.set(tabela, adaptador);
                return adaptador;
            }
            reconstruirTabelaPorId(idTabela) {
                const adaptador = [...this.adapters.keys()].find(tabela => tabela.id === idTabela);
                if (adaptador) {
                    this.adapters.get(adaptador)?.reconstruirCartoes();
                }
            }
            atualizarTodos() {
                this.adapters.forEach(adaptador => adaptador.reconstruirCartoes());
            }
        }
        class AdaptadorTabelaResponsiva {
            constructor(tabela, config, mediaQuery) {
                this.tabela = tabela;
                this.config = {
                    principal: [],
                    meta: [],
                    resumo: [],
                    detalhesPrioritarios: [],
                    ocultarDetalhes: [],
                    ...config
                };
                this.mediaQuery = mediaQuery;
                this.cardContainer = null;
                this.observer = null;
                this.debounceId = null;
            }
            inicializar() {
                const corpo = this.tabela.tBodies?.[0];
                if (!corpo) return;
                this.cardContainer = document.createElement('div');
                this.cardContainer.className = 'table-card-list';
                this.cardContainer.setAttribute('aria-live', 'polite');
                const containerTabela = this.tabela.parentElement;
                if (containerTabela) {
                    containerTabela.insertBefore(this.cardContainer, this.tabela.nextSibling);
                } else {
                    this.tabela.insertAdjacentElement('afterend', this.cardContainer);
                }
                this.mediaQuery.addEventListener('change', () => this.sincronizarVisibilidade());
                this.observer = new MutationObserver(() => this.agendarReconstrucao());
                this.observer.observe(corpo, { childList: true, subtree: true, characterData: true });
                this.sincronizarVisibilidade();
                this.reconstruirCartoes();
            }
            sincronizarVisibilidade() {
                const usarCards = this.mediaQuery.matches;
                if (this.cardContainer) {
                    this.cardContainer.style.display = usarCards ? 'flex' : 'none';
                }
                if (usarCards) {
                    this.reconstruirCartoes();
                }
            }
            agendarReconstrucao() {
                if (this.debounceId) cancelAnimationFrame(this.debounceId);
                this.debounceId = requestAnimationFrame(() => this.reconstruirCartoes());
            }
            normalizarTexto(valor) {
                return (valor || '').toString().trim().toLowerCase();
            }
            obterCabecalhos() {
                const cabecalhos = [];
                this.tabela.querySelectorAll('thead th').forEach((th) => {
                    cabecalhos.push((th?.textContent || '').trim());
                });
                return cabecalhos;
            }
            resolverIndices(alvos, mapaCabecalho, totalColunas) {
                if (!Array.isArray(alvos)) return [];
                const indices = [];
                alvos.forEach(alvo => {
                    if (Number.isInteger(alvo)) {
                        if (alvo >= 0 && alvo < totalColunas) indices.push(alvo);
                        return;
                    }
                    const indice = mapaCabecalho.get(this.normalizarTexto(alvo));
                    if (Number.isInteger(indice)) {
                        indices.push(indice);
                    }
                });
                return indices;
            }
            extrairPrimeiroValor(celulas, mapaCabecalho, preferencias) {
                const indices = this.resolverIndices(preferencias, mapaCabecalho, celulas.length);
                for (const indice of indices) {
                    const texto = this.extrairTextoCelula(celulas[indice]);
                    if (texto) {
                        return { indice, texto };
                    }
                }
                for (let i = 0; i < celulas.length; i++) {
                    const texto = this.extrairTextoCelula(celulas[i]);
                    if (texto) {
                        return { indice: i, texto };
                    }
                }
                return { indice: -1, texto: '' };
            }
            extrairMultiplos(celulas, mapaCabecalho, preferencias) {
                const indices = this.resolverIndices(preferencias, mapaCabecalho, celulas.length);
                const resultados = [];
                indices.forEach(indice => {
                    const texto = this.extrairTextoCelula(celulas[indice]);
                    if (texto) {
                        resultados.push({ indice, texto });
                    }
                });
                return resultados;
            }
            extrairTextoCelula(celula) {
                if (!celula) return '';
                const textoAcessivel = celula.getAttribute('aria-label');
                if (textoAcessivel) return textoAcessivel.trim();
                const texto = celula.textContent?.trim();
                return texto || '';
            }
            criarMensagemEstado(tipo, mensagem) {
                const div = document.createElement('div');
                div.className = tipo;
                div.textContent = mensagem;
                this.cardContainer.appendChild(div);
            }
            construirDetalhes(celulas, cabecalhos, indicesPrincipais) {
                const mapaCabecalho = new Map(cabecalhos.map((cab, i) => [this.normalizarTexto(cab), i]));
                const total = celulas.length;
                const ocultar = new Set(this.resolverIndices(this.config.ocultarDetalhes, mapaCabecalho, total));
                const usados = new Set(indicesPrincipais);
                const detalharPrioritarios = this.resolverIndices(this.config.detalhesPrioritarios, mapaCabecalho, total)
                    .filter(indice => !usados.has(indice) && !ocultar.has(indice));
                const demais = [];
                for (let i = 0; i < total; i++) {
                    if (usados.has(i) || ocultar.has(i)) continue;
                    if (!detalharPrioritarios.includes(i)) {
                        demais.push(i);
                    }
                }
                return [...detalharPrioritarios, ...demais];
            }
            clonarAcoesInterativas(celula) {
                const interativos = celula?.querySelectorAll('button, a, [data-action]') || [];
                if (!interativos.length) return null;
                const fragment = document.createDocumentFragment();
                interativos.forEach(original => {
                    const clone = original.cloneNode(true);
                    clone.dataset.preventToggle = 'true';
                    if (clone.id) clone.removeAttribute('id');
                    clone.addEventListener('click', evento => {
                        evento.preventDefault();
                        evento.stopPropagation();
                        original.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
                    });
                    fragment.appendChild(clone);
                });
                return fragment;
            }
            criarLinhaDetalhe(indice, celula, cabecalhos) {
                const detalhe = document.createElement('div');
                detalhe.className = 'table-card-detail';
                const label = document.createElement('span');
                label.className = 'table-card-detail-label';
                label.textContent = cabecalhos[indice] || `Coluna ${indice + 1}`;
                const valor = document.createElement('div');
                valor.className = 'table-card-detail-value';
                const acoes = this.clonarAcoesInterativas(celula);
                if (acoes) {
                    valor.appendChild(acoes);
                } else {
                    valor.innerHTML = celula?.innerHTML?.trim() || this.extrairTextoCelula(celula) || '-';
                }
                detalhe.appendChild(label);
                detalhe.appendChild(valor);
                return detalhe;
            }
            ajustarAlturaDetalhes(card, expandir) {
                const detalhes = card.querySelector('.table-card-details');
                if (!detalhes) return;
                if (expandir) {
                    detalhes.style.maxHeight = `${detalhes.scrollHeight}px`;
                } else {
                    detalhes.style.maxHeight = '0px';
                }
            }
            construirCard(linha, cabecalhos) {
                const celulas = Array.from(linha.cells || []);
                if (celulas.length === 1) {
                    const celula = celulas[0];
                    const classe = celula.classList.contains('table-error')
                        ? 'table-card-error'
                        : celula.classList.contains('table-loading')
                            ? 'table-card-loading'
                            : 'table-card-empty';
                    this.criarMensagemEstado(classe, this.extrairTextoCelula(celula));
                    return null;
                }
                const mapaCabecalho = new Map(cabecalhos.map((cab, i) => [this.normalizarTexto(cab), i]));

        function lerArquivoImagemComoBase64(arquivo, limiteKb = 70) {
            return new Promise((resolve, reject) => {
                if (!arquivo) {

                }

                const reader = new FileReader();
                reader.onerror = () => reject(new Error('Falha ao ler a imagem.'));
                reader.onload = () => {
                    const imagem = new Image();
                    imagem.onload = () => {
                        const canvas = document.createElement('canvas');
                        const contexto = canvas.getContext('2d');
                        const maxLado = 1200;

                        let { width, height } = imagem;
                        if (Math.max(width, height) > maxLado) {
                            const proporcao = maxLado / Math.max(width, height);
                            width = Math.round(width * proporcao);
                            height = Math.round(height * proporcao);
                        }

                        canvas.width = width;
                        canvas.height = height;
                        contexto.drawImage(imagem, 0, 0, width, height);

                        const mimePadrao = 'image/jpeg';
                        let qualidade = 0.9;
                        let dataUrl = canvas.toDataURL(mimePadrao, qualidade);

                        const calcularTamanhoKb = (dataUrlImagem) => {
                            const base64 = dataUrlImagem.split(',')[1] || '';
                            return Math.round((base64.length * 3) / 4 / 1024);
                        };

                        let tamanhoAtual = calcularTamanhoKb(dataUrl);
                        let tentativas = 0;

                        while (tamanhoAtual > limiteKb && tentativas < 10) {
                            if (qualidade > 0.45) {
                                qualidade = Math.max(0.4, qualidade - 0.1);
                            } else {
                                const escalaCalculada = Math.max(0.55, Math.sqrt(limiteKb / Math.max(tamanhoAtual, 1)));
                                const escala = Math.min(0.9, escalaCalculada);
                                canvas.width = Math.max(320, Math.round(canvas.width * escala));
                                canvas.height = Math.max(320, Math.round(canvas.height * escala));
                                contexto.clearRect(0, 0, canvas.width, canvas.height);
                                contexto.drawImage(imagem, 0, 0, canvas.width, canvas.height);
                                qualidade = Math.max(0.5, qualidade - 0.05);

                            dataUrl = canvas.toDataURL(mimePadrao, qualidade);
                            tamanhoAtual = calcularTamanhoKb(dataUrl);
                            tentativas += 1;
                        }

                        if (tamanhoAtual > limiteKb) {
                            const fatorReducao = Math.max(0.45, Math.sqrt(limiteKb / Math.max(tamanhoAtual, 1)));

                        }

                }
            }
            const entradas = [];
            Object.keys(payload).forEach(key => {
                const valor = payload[key];
                if (valor === undefined || valor === null) {
                    entradas.push([key, '']);
                } else if (valor instanceof Date) {
                    entradas.push([key, valor.toISOString()]);
                } else if (typeof valor === 'object') {
                    try {
                        entradas.push([key, JSON.stringify(valor)]);

            const maxTentativas = Math.max(1, tentativasConfiguradas);

            for (let tentativa = 1; tentativa <= maxTentativas; tentativa++) {
                try {
                    const formData = new FormData();

                    try {

                        if (usarCache && resposta && resposta.success && chaveCache) {

                            return { success: false, error: mensagemDetalhada, _erroNotificado: true };

                if (carregamentoArmarios?.sucesso || estado.armariosCarregados) {

                    carregamentoSetoresPromise,

                    carregamentoEstatisticasPromise,

                ]);

        function calcularHoraPrevistaSaida() {
            const agora = new Date();
            agora.setHours(agora.getHours() + 1);
            const horas = String(agora.getHours()).padStart(2, '0');

            return `${horas}:${minutos}`;

        function atualizarInterfaceVisitaEstendida({ manterHorarioManual = false } = {}) {
            const formulario = elementos.armarioForm;
            const checkbox = elementos.visitaEstendidaInput;
            const inputHora = elementos.horaPrevistaInput;
            if (!formulario || !checkbox || !inputHora) {
                return;
            }

            const visitaEstendida = Boolean(checkbox.checked);
            formulario.dataset.visitaEstendida = visitaEstendida ? 'true' : 'false';

            if (visitaEstendida) {
                if (inputHora.value) {
                    formulario.dataset.horaPrevistaAnterior = inputHora.value;
                }
                inputHora.value = '';
                inputHora.disabled = true;
                inputHora.required = false;
            } else {
                inputHora.disabled = false;
                inputHora.required = true;
                const valorAnterior = formulario.dataset.horaPrevistaAnterior || '';
                if (!manterHorarioManual) {
                    if (valorAnterior) {

        function obterFiltrosPermitidosPorPerfil() {
            const perfilNormalizado = normalizarTexto(estado.perfilAtual);
            const filtrosAcompanhante = ['todos', 'livre', 'em-uso', 'contingencia'];
            const filtrosCompletos = ['todos', 'livre', 'em-uso', 'proximo', 'vencido', 'contingencia'];
            return perfilNormalizado === 'acompanhante' ? filtrosAcompanhante : filtrosCompletos;
        }
        function ajustarFiltrosDashboardParaPerfil() {
            if (!elementos.filterBtns || elementos.filterBtns.length === 0) return;

            const permitidos = new Set(obterFiltrosPermitidosPorPerfil());
            let filtrosAtuais = Array.isArray(estado.filtrosSelecionados)
                ? estado.filtrosSelecionados.map(normalizarTexto).filter(Boolean)
                : [];

            filtrosAtuais = filtrosAtuais.filter(filtro => permitidos.has(filtro));
            if (filtrosAtuais.length === 0) {
                filtrosAtuais = ['todos'];
            }

            estado.filtrosSelecionados = filtrosAtuais;

            elementos.filterBtns.forEach(botao => {
                const filtro = normalizarTexto(botao.dataset.filter) || 'todos';
                const visivel = permitidos.has(filtro);
                botao.style.display = visivel ? '' : 'none';
            });

            atualizarBotoesFiltroDashboard();

        // Achados e Perdidos
        function obterEstadoAchados() {
            if (!estado.achados) {
                estado.achados = {
                    itens: [],
                    carregando: false,
                    salvando: false,
                    filtros: {
                        busca: '',
                        status: 'todos',
                        dataInicio: '',
                        dataFim: ''
                    },
                    resumo: {
                        pendentes: 0,
                        encontrados: 0
                    }
                };
            }
            return estado.achados;
        }
        function mapearItemAchado(item) {
            const dataBruta = item?.dataGuarda;
            const dataObjeto = dataBruta ? new Date(dataBruta) : null;
            const historico = (item?.historicoContato || '').toString();
            return {
                idLinha: item?.idLinha,
                dono: (item?.dono || '').toString(),
                descricao: (item?.descricao || '').toString(),
                telefone: (item?.telefone || '').toString(),
                encontrado: Boolean(item?.encontrado),
                encontradoTexto: item?.encontradoTexto || (item?.encontrado ? 'Sim' : 'Não'),
                dataGuarda: dataObjeto && !isNaN(dataObjeto.getTime()) ? dataObjeto : null,
                dataGuardaTexto: item?.dataGuardaTexto || (dataObjeto ? formatarData(dataObjeto) : '-'),
                historicoContato: historico,
                ultimaLigacao: obterUltimaLigacao(historico)
            };
        }
        function obterUltimaLigacao(historicoTexto) {
            if (!historicoTexto) return '';
            const partes = historicoTexto.split(/\n+/).map(linha => linha.trim()).filter(Boolean);
            return partes.length ? partes[partes.length - 1] : '';
        }
        function atualizarResumoAchados(lista = []) {
            const alvo = obterEstadoAchados();
            const pendentes = lista.filter(item => !item.encontrado).length;
            const encontrados = lista.filter(item => item.encontrado).length;
            alvo.resumo = { pendentes, encontrados };
            if (elementos.achadosTotalPendentes) elementos.achadosTotalPendentes.textContent = pendentes;
            if (elementos.achadosTotalEncontrados) elementos.achadosTotalEncontrados.textContent = encontrados;
            if (elementos.achadosCardPendentes) {
                elementos.achadosCardPendentes.classList.toggle('highlight', pendentes > 0);
            }
            if (elementos.achadosCardEncontrados) {
                elementos.achadosCardEncontrados.classList.toggle('highlight', encontrados > 0);
            }
        }
        function aplicarFiltrosAchados(lista) {
            const alvo = obterEstadoAchados();
            const { busca, status, dataInicio, dataFim } = alvo.filtros;
            const buscaNormalizada = normalizarTextoBusca(busca);
            const inicio = dataInicio ? new Date(dataInicio) : null;
            const fim = dataFim ? new Date(dataFim) : null;

            return lista.filter(item => {
                if (status === 'pendentes' && item.encontrado) return false;
                if (status === 'encontrados' && !item.encontrado) return false;

                if (inicio && item.dataGuarda && item.dataGuarda < inicio) return false;
                if (fim && item.dataGuarda && item.dataGuarda > fim) return false;

                if (buscaNormalizada) {
                    const alvoBusca = [item.dono, item.descricao, item.telefone, item.historicoContato]
                        .map(valor => normalizarTextoBusca(valor)).join(' ');
                    if (!alvoBusca.includes(buscaNormalizada)) return false;
                }
                return true;
            });
        }
        function atualizarEstadoTabelaAchados() {
            const alvo = obterEstadoAchados();
            const carregando = alvo.carregando;
            if (elementos.achadosLoading) elementos.achadosLoading.hidden = !carregando;
            if (elementos.tabelaAchadosBody) elementos.tabelaAchadosBody.closest('table').hidden = carregando;
        }
        function renderizarTabelaAchados() {
            const alvo = obterEstadoAchados();
            if (!elementos.tabelaAchadosBody) return;

            const filtrados = aplicarFiltrosAchados(alvo.itens);
            elementos.tabelaAchadosBody.innerHTML = '';

            filtrados.forEach(item => {
                const linha = document.createElement('tr');

                const statusPill = document.createElement('span');
                statusPill.className = 'lf-pill';
                statusPill.innerHTML = `<i class="fas ${item.encontrado ? 'fa-circle-check' : 'fa-clock'}"></i> ${item.encontrado ? 'Encontrado' : 'Aguardando'}`;

                const ultimaLigacao = item.ultimaLigacao || '-';

        function alternarFiltroDashboard(filtroSelecionado) {
            const filtroNormalizado = normalizarTexto(filtroSelecionado);
            if (!filtroNormalizado || filtroNormalizado === 'todos') {
                estado.filtrosSelecionados = ['todos'];
                return;
            }
            const atuais = Array.isArray(estado.filtrosSelecionados)
                ? estado.filtrosSelecionados.filter(Boolean)
                : [];
            const conjunto = new Set(atuais.map(normalizarTexto));
            conjunto.delete('todos');
            if (conjunto.has(filtroNormalizado)) {
                conjunto.delete(filtroNormalizado);
            } else {
                conjunto.add(filtroNormalizado);
            }
            if (conjunto.size === 0) {
                conjunto.add('todos');
            }
            estado.filtrosSelecionados = Array.from(conjunto);

            if (!permitidos.has(filtroNormalizado)) return;

                const fragment = document.createDocumentFragment();
                armariosParaExibir.forEach((armario, index) => {
                    if (index === indicePrimeiroOcupado && indicePrimeiroOcupado > 0) {
                        fragment.appendChild(criarDivisorOcupados());
                    }
                    fragment.appendChild(criarCardArmario(armario));
                });
                elementos.armariosContainer.appendChild(fragment);
                renderizarArmariosAgendamento = null;
                return;
            }

            const processarLote = (deadline) => {
                if (versaoExecucao !== renderizarArmariosVersao) return;
                const tamanhoLote = 50;
                let itensProcessados = 0;
                while (
                    versaoExecucao === renderizarArmariosVersao &&
                    itensProcessados < tamanhoLote &&
                    armariosParaExibir[renderizarArmarios.indiceAtual]
                ) {
                    if (renderizarArmarios.indiceAtual === indicePrimeiroOcupado && indicePrimeiroOcupado > 0) {
                        elementos.armariosContainer.appendChild(criarDivisorOcupados());
                    }
                    elementos.armariosContainer.appendChild(
                        criarCardArmario(armariosParaExibir[renderizarArmarios.indiceAtual])
                    );
                    renderizarArmarios.indiceAtual += 1;
                    itensProcessados += 1;
                    if (deadline && deadline.timeRemaining && deadline.timeRemaining() <= 0) {
                        break;
                    }
                }
                if (versaoExecucao !== renderizarArmariosVersao) return;
                if (renderizarArmarios.indiceAtual < armariosParaExibir.length) {
                    agendarProcessamentoRenderizacao(processarLote);
                } else {
                    renderizarArmariosAgendamento = null;
                }
            };

            renderizarArmarios.indiceAtual = 0;
            agendarProcessamentoRenderizacao(processarLote);
        }

        async function confirmarLiberacaoPersistida(
            { idInterface = '', idPlanilha = '', tipo = '' } = {},
            { tentativas = 4, intervaloMs = 350 } = {}
        ) {
            try {
                const totalTentativas = Math.max(1, Number(tentativas) || 1);

                for (let tentativa = 1; tentativa <= totalTentativas; tentativa += 1) {
                    const armarioAtual = await buscarArmarioAtualizado({
                        idInterface,
                        idPlanilha,
                        tipo,
                        incluirTermos: true
                    });

                    if (armarioAtual && normalizarTexto(armarioAtual.status) === 'livre') {
                        return true;
                    }

                    if (tentativa < totalTentativas) {
                        await aguardar(intervaloMs);

        function garantirArmarioLiberadoLocal(id, metodo, confirmacao) {
            const armario = obterArmarioPorId(id);
            if (!armario) {
                return false;
            }

            const atualizacoes = {};
            let precisaAtualizar = false;
            const statusNormalizado = normalizarTexto(armario.status);
            const tipoNormalizado = normalizarTexto(armario.tipo);
            const termoStatusNormalizado = normalizarTexto(armario.termoStatus);

            if (statusNormalizado !== 'livre') {
                Object.assign(atualizacoes, {
                    status: 'livre',
                    nomeVisitante: '',
                    nomePaciente: '',
                    leito: '',
                    volumes: '',
                    whatsapp: '',
                    horaInicio: '',
                    horaPrevista: '',
                    visitaEstendida: false
                });
                precisaAtualizar = true;
            }

            if (tipoNormalizado === 'acompanhante') {
                if (!armario.termoFinalizado) {
                    atualizacoes.termoFinalizado = true;
                    precisaAtualizar = true;
                }
                if (armario.termoAplicado) {
                    atualizacoes.termoAplicado = false;
                    precisaAtualizar = true;
                }
                if (termoStatusNormalizado !== 'finalizado') {
                    atualizacoes.termoStatus = 'finalizado';
                    precisaAtualizar = true;
                }

                const termoAtualizado = { ...(armario.termoInfo || {}) };
                let atualizouTermo = false;

                if (!termoAtualizado.finalizadoEm) {
                    termoAtualizado.finalizadoEm = new Date().toISOString();
                    atualizouTermo = true;
                }

                if (metodo && termoAtualizado.metodoFinal !== metodo) {
                    termoAtualizado.metodoFinal = metodo;
                    atualizouTermo = true;
                }

                if (metodo === 'cpf' && confirmacao && termoAtualizado.cpfConfirmacao !== confirmacao) {
                    termoAtualizado.cpfConfirmacao = confirmacao;
                    atualizouTermo = true;
                }

                if (normalizarTexto(termoAtualizado.status) !== 'finalizado') {
                    termoAtualizado.status = 'Finalizado';
                    atualizouTermo = true;
                }

                if (!armario.termoInfo || atualizouTermo) {
                    atualizacoes.termoInfo = termoAtualizado;
                    precisaAtualizar = true;
                }
            }

            if (!precisaAtualizar) {
                return false;
            }

            return Boolean(atualizarArmarioLocal(id, atualizacoes));
        }

        function renderizarTabelaLiberacao() {

            const linhas = Array.isArray(estadoLiberacao.linhas) ? estadoLiberacao.linhas : [];
            const totalColunas = colunas.length || (linhas[0]?.length ?? 0);
            headRow.innerHTML = '';

                colunas.forEach(coluna => {

        function obterFiltrosLiberacaoDoFormulario() {
            return {
                dataInicio: converterDataTextoParaISO(elementos.liberacaoDataInicio?.value || ''),
                dataFim: converterDataTextoParaISO(elementos.liberacaoDataFim?.value || ''),
                paciente: elementos.liberacaoPaciente?.value?.trim() || '',
                prontuario: elementos.liberacaoProntuario?.value?.trim() || ''
            };

        function sanearFiltrosLiberacao(filtros = {}) {
            const padraoLocal = obterDataHoraLocalPadrao().data;
            const paciente = (filtros.paciente || '').toString().trim();
            const prontuario = (filtros.prontuario || '').toString().trim();
            const filtroTextoAtivo = Boolean(paciente || prontuario);
            let dataInicio = converterDataTextoParaISO(filtros.dataInicio || '') || '';
            let dataFim = converterDataTextoParaISO(filtros.dataFim || '') || '';

            if (!filtroTextoAtivo) {
                if (dataInicio && !dataFim) {
                    dataFim = dataInicio;
                }
                if (dataFim && !dataInicio) {
                    dataInicio = dataFim;
                }
                if (!dataInicio && !dataFim) {
                    dataInicio = padraoLocal;
                    dataFim = padraoLocal;
                }
            } else {
                if (dataInicio && !dataFim) {
                    dataFim = dataInicio;
                }
                if (dataFim && !dataInicio) {
                    dataInicio = dataFim;
                }
            }

            return { dataInicio, dataFim, paciente, prontuario };
        }
        function gerarChaveFiltroLiberacao(filtros = {}) {

        async function carregarTabelaLiberacao(opcoes = {}) {

            if (!tabela) return;
            const estadoLiberacao = obterEstadoLiberacao();
            const { filtros: filtrosOverride, forcarAtualizacao = false } = opcoes;
            const filtrosFormulario = obterFiltrosLiberacaoDoFormulario();
            const filtrosAtuais = sanearFiltrosLiberacao({
                dataInicio: filtrosOverride?.dataInicio ?? filtrosFormulario.dataInicio ?? estadoLiberacao.filtros?.dataInicio,
                dataFim: filtrosOverride?.dataFim ?? filtrosFormulario.dataFim ?? estadoLiberacao.filtros?.dataFim,
                paciente: filtrosOverride?.paciente ?? filtrosFormulario.paciente ?? estadoLiberacao.filtros?.paciente,
                prontuario: filtrosOverride?.prontuario ?? filtrosFormulario.prontuario ?? estadoLiberacao.filtros?.prontuario
            });
            sincronizarCamposFiltroLiberacao(filtrosAtuais);
            if (!filtrosAtuais.dataInicio || !filtrosAtuais.dataFim) {
                estadoLiberacao.erro = 'Informe um período válido para realizar a busca.';

                mostrarEstadoTabelaLiberacao('A data inicial não pode ser posterior à data final.', 'error');
                atualizarResumoLiberacao();

            const chaveFiltroAtual = gerarChaveFiltroLiberacao(filtrosAtuais);
            if (!forcarAtualizacao && estadoLiberacao.linhasCarregadas && estadoLiberacao.chaveFiltrosAplicados === chaveFiltroAtual) {
                estadoLiberacao.filtros = filtrosAtuais;
                atualizarResumoLiberacao();
                renderizarTabelaLiberacao();

            estadoLiberacao.carregando = true;

                });

                    throw new Error(resultado.error || 'Falha ao obter dados.');
                }
                estadoLiberacao.colunas = Array.isArray(resultado.columns) ? resultado.columns : [];
                estadoLiberacao.linhas = Array.isArray(resultado.rows) ? resultado.rows : [];
                estadoLiberacao.totalPlanilha = Number(resultado.totalPlanilha) || estadoLiberacao.linhas.length;
                estadoLiberacao.totalFiltrado = Number(resultado.totalFiltrado) || estadoLiberacao.linhas.length;
                estadoLiberacao.ultimaAtualizacao = Date.now();
                estadoLiberacao.linhasCarregadas = true;
                const filtrosRetornados = sanearFiltrosLiberacao({
                    dataInicio: resultado?.filtro?.dataInicio || filtrosAtuais.dataInicio,
                    dataFim: resultado?.filtro?.dataFim || filtrosAtuais.dataFim,
                    paciente: resultado?.filtro?.paciente ?? filtrosAtuais.paciente,
                    prontuario: resultado?.filtro?.prontuario ?? filtrosAtuais.prontuario
                });
                estadoLiberacao.filtros = filtrosRetornados;
                estadoLiberacao.chaveFiltrosAplicados = gerarChaveFiltroLiberacao(filtrosRetornados);
                estadoLiberacao.erro = '';
                sincronizarCamposFiltroLiberacao(filtrosRetornados);
                renderizarTabelaLiberacao();
            } catch (erro) {
                console.error('Erro ao carregar dados de liberação:', erro);
                estadoLiberacao.erro = 'Não foi possível carregar os registros de liberação.';
                estadoLiberacao.linhas = [];
                estadoLiberacao.linhasCarregadas = false;
                estadoLiberacao.totalPlanilha = 0;
                estadoLiberacao.totalFiltrado = 0;
                mostrarEstadoTabelaLiberacao('Não foi possível carregar os registros de liberação.', 'error');
                mostrarErro('Não foi possível carregar os registros de liberação.');
            } finally {
                estadoLiberacao.carregando = false;
                atualizarResumoLiberacao();
            }
        }

        async function carregarTabelaTermos(opcoes = {}) {
            const { recarregarArmarios = true } = opcoes;
            if (!elementos.tabelaTermosBody) return;

            const carregamentoId = ++estado.carregamentoTermosId;
            const tbody = elementos.tabelaTermosBody;
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:16px; color:#5b6b86;">Carregando termos...</td></tr>';

            if (recarregarArmarios || !estado.armariosCarregados) {
                await carregarArmarios({ forcarAtualizacao: recarregarArmarios, incluirTermos: true });
            }
            if (estado.carregamentoTermosId !== carregamentoId) return;

            if (!estado.armariosCarregados) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:16px; color:#c0392b;">Erro ao carregar termos.</td></tr>';
                return;
            }

            atualizarFiltroUnidadeTermos();
            sincronizarCamposFiltroTermo();
            const filtros = obterFiltrosTermo();
            const statusFiltro = normalizarTexto(filtros.status);
            const unidadeFiltro = normalizarTexto(filtros.unidade);
            const buscaFiltro = normalizarTextoBusca(filtros.busca);
            const prontuarioFiltro = normalizarTextoBusca(filtros.prontuario);
            const possuiFiltros = statusFiltro !== 'todos'
                || unidadeFiltro !== 'todas'
                || Boolean(buscaFiltro)
                || Boolean(prontuarioFiltro);

            const armariosComTermo = estado.armarios
                .filter(a => normalizarTexto(a.tipo) === 'acompanhante')
                .filter(a => usuarioPodeVerUnidade(a.unidade))
                .filter(a => {
                    const statusArmario = normalizarTexto(a.status);
                    const statusTermo = normalizarTexto(a.termoStatus);
                    return statusArmario !== 'livre' || statusTermo === 'finalizado';
                })
                .filter(a => {
                    if (!buscaFiltro) return true;
                    const camposBusca = [
                        a.numero,
                        a.nomePaciente,
                        a.nomeVisitante,
                        a.prontuario,
                        a.unidade,
                        a.termoInfo?.paciente,
                        a.termoInfo?.acompanhante
                    ];
                    return camposBusca.some(campo => normalizarTextoBusca(campo).includes(buscaFiltro));
                })
                .filter(a => {
                    if (!prontuarioFiltro) return true;
                    const prontuario = normalizarTextoBusca(a.prontuario || a.termoInfo?.prontuario || '');
                    return prontuario.includes(prontuarioFiltro);
                })
                .filter(a => {
                    const statusTermoNormalizado = normalizarTexto(a.termoStatus || a.termoInfo?.status);
                    if (statusFiltro === 'pendente') {
                        return statusTermoNormalizado === 'pendente';
                    }
                    if (statusFiltro === 'em andamento' || statusFiltro === 'andamento') {
                        return statusTermoNormalizado === 'em andamento';
                    }
                    if (statusFiltro === 'finalizado') {
                        return statusTermoNormalizado === 'finalizado' || Boolean(a.termoInfo?.finalizado);
                    }
                    return true;
                })
                .filter(a => unidadeFiltro === 'todas' || normalizarTexto(a.unidade) === unidadeFiltro)
                .sort((a, b) => {
                    const peso = (valor) => {
                        if (!valor.termoInfo) return 0;
                        return valor.termoStatus === 'finalizado' ? 2 : 1;
                    };
                    const pesoA = peso(a);
                    const pesoB = peso(b);
                    if (pesoA === pesoB) {
                        return new Date(b.dataRegistro || 0) - new Date(a.dataRegistro || 0);
                    }
                    return pesoA - pesoB;
                });

            if (!armariosComTermo.length) {
                const mensagemVazia = possuiFiltros
                    ? 'Nenhum termo encontrado para os filtros selecionados.'
                    : 'Nenhum termo ativo ou pendente no momento.';
                tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding:16px; color:#5b6b86;">${mensagemVazia}</td></tr>`;
                return;
            }

            const linhas = [];

            const armariosParaResumo = [];

            armariosComTermo.forEach((armario) => {
                const chaveMovimentacao = obterChaveMovimentacaoArmario(armario);
                const cache = estado.movimentacoes[chaveMovimentacao];
                if (cache && Number.isFinite(cache.contagem)) {
                    movimentacoesPorArmario.set(chaveMovimentacao, cache.contagem);
                    return;
                }

                armariosParaResumo.push({
                    chave: chaveMovimentacao,
                    id: armario.idPlanilha || armario.id || '',
                    numero: armario.numero || '',
                    numeroArmario: armario.numero || '',
                    armarioId: armario.idPlanilha || '',
                    tipo: armario.tipo || ''
                });
            });

            if (armariosParaResumo.length) {
                try {
                    const respostaResumo = await callGoogleScript('getMovimentacoesResumo', {
                        armarios: armariosParaResumo.map(item => ({
                            id: item.id,
                            numero: item.numero,

                            armarioId: item.armarioId,
                            tipo: item.tipo
                        }))
                    });

                    if (respostaResumo && respostaResumo.success && respostaResumo.data) {
                        Object.entries(respostaResumo.data).forEach(([chave, valor]) => {
                            const contagem = Number(valor) || 0;

                            movimentacoesPorArmario.set(chave, contagem);

                }
            }

            if (estado.carregamentoTermosId !== carregamentoId) return;

            for (const armario of armariosComTermo) {

                const statusTermoNormalizado = normalizarTexto(armario.termoStatus);
                const finalizado = statusTermoNormalizado === 'finalizado';

        function aplicarFiltrosLogs() {

            if (!Array.isArray(estado.logs) || estado.logs.length === 0) {
                exibirEstadoTabelaLogs('Nenhum log disponível.');
                return;

            const dataInicioValor = elementos.logsDataInicio?.value || '';
            const dataFimValor = elementos.logsDataFim?.value || '';
            const filtroUsuario = normalizarTextoBusca(elementos.logsFiltroUsuario?.value);
            const filtroBusca = normalizarTextoBusca(elementos.logsBusca?.value);

            const dataInicio = dataInicioValor ? new Date(`${dataInicioValor}T00:00:00`) : null;
            const dataFim = dataFimValor ? new Date(`${dataFimValor}T23:59:59`) : null;

            const logsFiltrados = estado.logs.filter(log => {
                const dataLog = new Date(log.dataHora);
                if (Number.isNaN(dataLog.getTime())) return false;
                if (dataInicio && dataLog < dataInicio) return false;
                if (dataFim && dataLog > dataFim) return false;
                if (filtroUsuario) {
                    const usuario = normalizarTextoBusca(log.usuario);

                return;
            }

            const confirmacao = await Swal.fire({
                title: 'Executar backup agora?',

                icon: 'warning',
                showCancelButton: true,

            });

            if (!confirmacao.isConfirmed) {
                return;
            }

            const textoOriginalBotao = elementos.backupExecutarBtn ? elementos.backupExecutarBtn.innerHTML : '';

            try {
                if (elementos.backupExecutarBtn) {
                    elementos.backupExecutarBtn.disabled = true;
                    elementos.backupExecutarBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Executando backup...';
                }
                if (elementos.backupResultado) {

                }

                }

                const total = Number(resultado.totalRegistrosMovidos) || 0;
                const detalhes = Array.isArray(resultado.relatorio)
                    ? resultado.relatorio.map(item => `${item.aba}: ${item.movidos || 0}`).join(' | ')
                    : '';

                if (elementos.backupResultado) {
                    elementos.backupResultado.textContent = `Backup concluído em ${resultado.timestamp || ''}. Registros movidos: ${total}. ${detalhes}`;
                }

                Swal.close();
                mostrarSucesso(`Backup concluído. Registros movidos: ${total}.`);
                carregarListaBackups({ forcar: true });
            } catch (erro) {
                console.error('Erro ao executar backup:', erro);

        function formatarTamanhoArquivo(bytes) {
            const numero = Number(bytes) || 0;
            if (numero <= 0) return '—';
            const unidades = ['B', 'KB', 'MB', 'GB'];
            let valor = numero;
            let indice = 0;
            while (valor >= 1024 && indice < unidades.length - 1) {
                valor /= 1024;
                indice++;
            }
            const casas = valor < 10 && indice > 0 ? 1 : 0;
            return `${valor.toFixed(casas)} ${unidades[indice]}`;
        }
        function formatarMesAnoBackup(mesAno) {
            const texto = (mesAno || '').toString();
            const match = texto.match(/^(\d{4})-(\d{2})$/);
            if (!match) return texto || 'Sem data';
            const meses = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho',
                'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
            const indiceMes = Number(match[2]) - 1;
            const nomeMes = meses[indiceMes] || match[2];
            const titulo = nomeMes.charAt(0).toUpperCase() + nomeMes.slice(1);
            return `${titulo} de ${match[1]}`;
        }

        function renderizarListaBackups() {

                    elementos.backupListaResumo.textContent = 'Nenhum backup guardado.';

                return;
            }

            // Agrupar por mês/ano preservando a ordem (já vem do mais recente para o mais antigo)
            const grupos = [];
            const indicePorMes = {};
            itens.forEach(backup => {
                const chave = backup.mesAno || 'sem-data';
                if (indicePorMes[chave] === undefined) {
                    indicePorMes[chave] = grupos.length;
                    grupos.push({ chave, mesAno: backup.mesAno, itens: [] });
                }
                grupos[indicePorMes[chave]].itens.push(backup);
            });

            const html = grupos.map(grupo => {
                const cards = grupo.itens.map(backup => criarCardBackupHtml(backup)).join('');

                const totalMeses = grupos.length;
                const hora = estadoBackups.ultimaAtualizacao

        async function alternarDetalhesBackup(id) {
            const estadoBackups = obterEstadoBackups();
            const alvo = obterElementoDetalheBackup(id);
            if (!alvo) return;

            const estaExpandido = Boolean(estadoBackups.expandidos[id]);
            if (estaExpandido) {
                alvo.hidden = true;
                estadoBackups.expandidos[id] = false;
                marcarBotaoDetalhesBackup(id, false);
                return;
            }

            // Já temos o detalhe em cache
            if (estadoBackups.detalhes[id]) {
                aplicarDetalheBackupNaTela(id, estadoBackups.detalhes[id]);
                estadoBackups.expandidos[id] = true;
                marcarBotaoDetalhesBackup(id, true);
                return;
            }

            const botao = elementos.backupLista
                ? elementos.backupLista.querySelector(`.backup-card-detalhes-btn[data-backup-id="${cssEscape(id)}"]`)
                : null;
            if (botao) {
                botao.disabled = true;
                botao.innerHTML = '<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Carregando...';
            }
            alvo.innerHTML = '<p class="backup-detalhe-carregando">Lendo planilhas do backup...</p>';
            alvo.hidden = false;

            try {
                const resposta = await callGoogleScript('detalharBackup', { id }, { cache: false });
                if (!resposta || !resposta.success) {
                    throw new Error(resposta && resposta.error ? resposta.error : 'Não foi possível ler o backup.');
                }
                estadoBackups.detalhes[id] = {
                    abas: Array.isArray(resposta.abas) ? resposta.abas : [],
                    totalRegistros: Number(resposta.totalRegistros) || 0
                };
                estadoBackups.expandidos[id] = true;
                aplicarDetalheBackupNaTela(id, estadoBackups.detalhes[id]);
                marcarBotaoDetalhesBackup(id, true);
            } catch (erro) {
                console.error('Erro ao detalhar backup:', erro);
                alvo.innerHTML = '<p class="backup-detalhe-erro">Não foi possível ler as planilhas deste backup.</p>';
                estadoBackups.expandidos[id] = false;

                if (botao) {
                    botao.disabled = false;
                }
            }
        }

        async function abrirCadastroContingencia() {
            if (!perfilAtualEhAcompanhante()) {
                mostrarErro('Ação disponível apenas no perfil de acompanhantes.');
                return;
            }
            const payload = {
                unidade: estado.unidadeAtual === 'todas' ? '' : estado.unidadeAtual,
                usuarioResponsavel: obterDescricaoResponsavelAtual()
            };
            const requestId = ++carregamentoContingenciaId;
            let sucesso = false;
            abrirModalTermoCarregando();
            try {
                const resposta = await callGoogleScript('registrarContingenciaTermo', payload);
                if (carregamentoContingenciaId !== requestId) {
                    return;
                }
                if (!resposta.success) {
                    notificarErroPadrao(resposta, 'Não foi possível iniciar a contingência.');
                    fecharTermoModal();
                    return;
                }

                const novoArmario = resposta.data || {};
                const armarioNormalizado = {
                    ...novoArmario,
                    id: normalizarIdentificador(novoArmario.id),
                    idPlanilha: novoArmario.idPlanilha !== undefined && novoArmario.idPlanilha !== null
                        ? novoArmario.idPlanilha.toString().trim()
                        : '',
                    numero: normalizarIdentificador(novoArmario.numero),
                    unidade: novoArmario.unidade ? novoArmario.unidade.toString().trim() : '',
                    prontuario: novoArmario.prontuario ? novoArmario.prontuario.toString().trim() : '',
                    observacoes: novoArmario.observacoes ? novoArmario.observacoes.toString().trim() : '',
                    visitaEstendida: Boolean(novoArmario.visitaEstendida),
                    ehContingencia: true,
                    status: 'contingencia'
                };
                estado.armarios.push(armarioNormalizado);
                estado.armariosCarregados = true;
                abrirTermoWizard(armarioNormalizado.id);
                sucesso = true;
                atualizarResumoDashboardLocal();
                atualizarInterface();
                carregarDadosTabelas({ recarregarArmarios: false }).catch(console.error);
                sincronizarDadosArmariosEmSegundoPlano({ recarregarArmarios: true });
            } finally {
                if (!sucesso && carregamentoContingenciaId === requestId) {
                    setEstadoCarregamentoTermo(false);
                }
            }
        }

        // "Em uso há 2h 15min" — calculado a partir de dataRegistro + horaInicio.
        // Aceita data em dd/mm/aaaa ou aaaa-mm-dd; sem data válida, assume hoje.
        function calcularTempoDecorridoUso(armario) {
            const hora = (armario?.horaInicio || '').toString().trim();
            const casadaHora = hora.match(/^(\d{1,2}):(\d{2})/);
            if (!casadaHora) return '';
            const dataBruta = (armario?.dataRegistro || '').toString().trim();
            let ano; let mes; let dia;
            let casadaData = dataBruta.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
            if (casadaData) {
                dia = Number(casadaData[1]); mes = Number(casadaData[2]); ano = Number(casadaData[3]);
            } else {
                casadaData = dataBruta.match(/^(\d{4})-(\d{2})-(\d{2})/);
                if (casadaData) {
                    ano = Number(casadaData[1]); mes = Number(casadaData[2]); dia = Number(casadaData[3]);
                } else {
                    const hoje = new Date();
                    ano = hoje.getFullYear(); mes = hoje.getMonth() + 1; dia = hoje.getDate();
                }
            }
            const inicio = new Date(ano, mes - 1, dia, Number(casadaHora[1]), Number(casadaHora[2]));
            if (Number.isNaN(inicio.getTime())) return '';
            const minutos = Math.floor((Date.now() - inicio.getTime()) / 60000);
            if (!Number.isFinite(minutos) || minutos < 0) return '';
            if (minutos < 1) return 'agora mesmo';
            if (minutos < 60) return `há ${minutos}min`;
            const horas = Math.floor(minutos / 60);
            const resto = minutos % 60;
            if (horas < 24) {
                return resto ? `há ${horas}h ${String(resto).padStart(2, '0')}min` : `há ${horas}h`;
            }
            const dias = Math.floor(horas / 24);
            const horasResto = horas % 24;
            return horasResto ? `há ${dias}d ${horasResto}h` : `há ${dias}d`;
        }

        function criarControladorAssinaturaFinalizacao(canvas, field) {
            if (!canvas) return null;
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            const areaAssinatura = canvas.parentElement;
            const areaRect = areaAssinatura ? areaAssinatura.getBoundingClientRect() : rect;
            const largura = areaRect.width || rect.width || canvas.clientWidth || 0;
            const altura = areaRect.height || rect.height || canvas.clientHeight || 160;
            canvas.width = largura;
            canvas.height = altura;
            canvas.style.width = '100%';
            canvas.style.height = `${altura}px`;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#0b1324';
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let desenhando = false;
            let assinou = false;

            const obterPosicao = (evento) => {
                const bounds = canvas.getBoundingClientRect();
                return {
                    x: evento.clientX - bounds.left,
                    y: evento.clientY - bounds.top
                };
            };

            const iniciar = (evento) => {
                evento.preventDefault();
                desenhando = true;
                const posicao = obterPosicao(evento);
                ctx.beginPath();
                ctx.moveTo(posicao.x, posicao.y);
                canvas.setPointerCapture?.(evento.pointerId);
                field?.classList.remove('invalid');
            };

            const desenhar = (evento) => {
                if (!desenhando) return;
                evento.preventDefault();
                const posicao = obterPosicao(evento);
                ctx.lineTo(posicao.x, posicao.y);
                ctx.stroke();
                assinou = true;
                field?.classList.remove('invalid');
            };

            const finalizar = (evento) => {
                if (!desenhando) return;
                evento.preventDefault();
                desenhando = false;
                canvas.releasePointerCapture?.(evento.pointerId);
            };

            const limpar = (mostrarErro = true) => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                assinou = false;
                if (mostrarErro) {
                    field?.classList.add('invalid');
                }
            };

            const removerEventos = () => {
                canvas.removeEventListener('pointerdown', iniciar);
                canvas.removeEventListener('pointermove', desenhar);
                canvas.removeEventListener('pointerup', finalizar);
                canvas.removeEventListener('pointerleave', finalizar);
                canvas.removeEventListener('pointercancel', finalizar);
            };

            canvas.addEventListener('pointerdown', iniciar);
            canvas.addEventListener('pointermove', desenhar);
            canvas.addEventListener('pointerup', finalizar);
            canvas.addEventListener('pointerleave', finalizar);
            canvas.addEventListener('pointercancel', finalizar);
            field?.classList.add('invalid');

            return {
                limpar,
                possuiAssinatura: () => assinou,
                obterImagem: () => gerarAssinaturaCompacta(canvas),
                destruir: removerEventos
            };
        }

        function consolidarInventarioMovimentacao(volumesBase = [], movimentacoes = []) {

                const chave = normalizarTexto(item.descricao);
                const existente = inventario.get(chave) || { descricao: item.descricao, quantidade: 0 };
                existente.quantidade += (Number(item.quantidade) || 0) * fator;
                inventario.set(chave, existente);

            normalizarListaItensMovimentacao(volumesBase).forEach(item => adicionarItem(item, 1));

            movimentacoes.forEach(mov => {

                const fator = tipo === 'entrada' ? 1 : tipo === 'saida' ? -1 : 0;
                if (!fator) return;
                normalizarListaItensMovimentacao(mov.itens).forEach(item => adicionarItem(item, fator));

        function aplicarMascaraLeito(valor) {
            const texto = (valor || '').toString();
            const somenteAlfanumerico = texto.replace(/[^A-Za-z0-9]/g, '');

            const prefixoEncontrado = somenteAlfanumerico.match(/^[A-Za-z]+/);
            const prefixo = prefixoEncontrado ? prefixoEncontrado[0].toUpperCase() : '';
            const digitos = somenteAlfanumerico.slice(prefixo.length).replace(/\D/g, '');

            const primeiraParte = digitos.slice(0, 3);
            const restante = digitos.slice(3);

            let formatado = prefixo ? `${prefixo}-` : '';
            formatado += primeiraParte;

            if (restante) {
                formatado += `/${restante}`;
            }

            return formatado;
        }
        function aplicarMascaraLeitoCampo(campo) {
            if (!campo) return;
            const aplicarMascara = () => {
                const formatado = aplicarMascaraLeito(campo.value);
                if (campo.value !== formatado) {
                    campo.value = formatado;
                    try {
                        const pos = formatado.length;
                        campo.setSelectionRange(pos, pos);
                    } catch (erro) {
                        console.warn('Não foi possível ajustar o cursor do campo de leito.', erro);
                    }
                }
            };
            campo.addEventListener('input', aplicarMascara);
            aplicarMascara();
        }

        async function salvarMovimentacao() {

            movimentacaoEmProgresso = true;

                const armario = obterArmarioPorId(movimentacaoArmarioAtual) || estado.armarios.find(item => normalizarIdentificador(item.idPlanilha) === normalizarIdentificador(movimentacaoArmarioAtual));
                if (!armario) {
                    mostrarErro('Armário não encontrado para registrar movimentação.');
                    return;
                }
                const responsavelRegistro = obterDescricaoResponsavelAtual();
                if (!responsavelRegistro) {
                    mostrarErro('Não foi possível identificar o usuário responsável. Faça login novamente para registrar movimentações.');
                    return;
                }
                const identificadores = montarIdentificadoresArmario(armario);
                const tipoSelecionado = normalizarTexto(elementos.movTipo.value);
                const itensMovimentados = obterItensMovimentacaoFormulario();
                if (!tipoSelecionado) {
                    mostrarErro('Selecione o tipo de movimentação.');
                    return;
                }
                if ((tipoSelecionado === 'entrada' || tipoSelecionado === 'saida') && !itensMovimentados.length) {
                    mostrarErro('Informe os itens movimentados com quantidade e descrição.');
                    return;
                }
                if ((tipoSelecionado === 'entrada' || tipoSelecionado === 'saida') && itensMovimentados.some(item => !item.fotoBase64)) {
                    mostrarErro('Inclua a foto de cada volume listado antes de prosseguir.');
                    return;
                }
                const observacaoMov = elementos.movObservacao?.value?.trim() || '';
                const assinaturaMov = obterAssinaturaMovimentacao();
                if (!assinaturaMov.base64) {
                    mostrarErro('Colha a assinatura do responsável para registrar a movimentação.');
                    elementos.movSignatureField?.classList.add('invalid');
                    return;
                }
                // O servidor persiste apenas uma foto da movimentação (a do primeiro volume).
                // Enviar a foto de todos os volumes só inflaria o corpo da requisição e deixaria
                // o salvamento mais lento, então transmitimos a evidência apenas no primeiro item.
                const itensParaEnvio = itensMovimentados.map((item, indice) => {
                    const base = { quantidade: item.quantidade, descricao: item.descricao };
                    if (indice === 0) {
                        base.fotoBase64 = item.fotoBase64;
                        base.fotoMime = item.fotoMime;
                    }
                    return base;
                });
                const dados = {
                    armarioId: identificadores?.idPlanilha || '',
                    numeroArmario: identificadores?.numeroArmario || '',
                    tipo: tipoSelecionado || identificadores?.tipo || '',
                    tipoArmario: identificadores?.tipo || '',
                    descricao: observacaoMov,
                    responsavel: responsavelRegistro,
                    data: elementos.movData.value,
                    hora: elementos.movHora.value,
                    itens: itensParaEnvio,
                    assinaturaBase64: assinaturaMov.dataUrl || '',
                    assinaturaMime: assinaturaMov.mime || 'image/png',
                    // Gerado uma única vez por operação; reenvios (retry/fallback)
                    // carregam o mesmo token e o servidor deduplica, evitando
                    // movimentações duplicadas em caso de resposta perdida.
                    clienteMovimentacaoId: gerarTokenIdempotencia()
                };
                // Neste ponto todos os dados (itens, fotos e assinatura) já foram capturados
                // de forma síncrona no objeto `dados`. Portanto podemos fechar o modal e liberar
                // a interface imediatamente, registrando a movimentação em segundo plano — sem
                // bloquear o usuário e sem reler/atualizar o front depois de salvar.
                mostrarSucesso('Movimentação registrada');
                reproduzirSomMovimentacao('sucesso');

                // Limpa o formulário e fecha o modal antes de disparar o salvamento. A ordem é
                // segura porque `dados` já contém uma cópia de tudo que será enviado.
                elementos.movimentacaoForm.reset();
                elementos.movTipo.value = '';
                if (elementos.movObservacao) {
                    elementos.movObservacao.value = '';

                limparItensMovimentacaoFormulario();

                elementos.movData.value = padraoLocal.data;
                elementos.movHora.value = padraoLocal.hora;
                ativarAbaMovimentacao('');
                mostrarPassoMovimentacao(0);
                fecharMovimentacaoModal();

                // Salvamento em segundo plano (fire-and-forget). Não atualizamos o front após
                // salvar; apenas avisamos caso o registro falhe, para que nada se perca em silêncio.
                callGoogleScript('salvarMovimentacao', dados)
                    .then(resultado => {
                        if (!resultado || !resultado.success) {
                            notificarErroPadrao(resultado || { error: 'Não foi possível registrar a movimentação.' });
                        }
                    })
                    .catch(erro => {
                        console.error('Erro ao registrar movimentação em segundo plano:', erro);
                        mostrarErro('Não foi possível registrar a movimentação. Verifique a conexão e tente novamente.');
                    });

            }
