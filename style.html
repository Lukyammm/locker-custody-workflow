<style>
        :root {
            /* Core palette */
            --color-primary-500: #3B82F6;
            --color-primary-600: #1D4ED8;
            --color-secondary-500: #10B981;
            --color-success-500: #5BA98C;
            --color-warning-500: #C67B2A;
            --color-danger-500: #8B1E3A;
            --color-danger-600: #6A1227;

            /* Neutrals */
            --color-neutral-0: #FFFFFF;
            --color-neutral-50: #F9FAFB;
            --color-neutral-100: #F3F4F6;
            --color-neutral-200: #E5E7EB;
            --color-neutral-500: #6B7280;
            --color-neutral-700: #1F2937;
            --color-neutral-900: #0F172A;
            --color-surface: #FFFFFF;
            --color-background: #F9FAFB;

            /* Status palette */
            --status-livre: #5BA98C;
            --status-em-uso: #4F6F97;
            --status-proximo: #C67B2A;
            --status-vencido: #8B1E3A;
            --status-contingencia: #52418F;

            /* Legacy mappings */
            --primary-color: var(--color-primary-500);
            --secondary-color: var(--color-secondary-500);
            --success-color: var(--color-success-500);
            --warning-color: var(--color-warning-500);
            --danger-color: var(--color-danger-500);
            --primary-dark: var(--color-primary-600);
            --danger-dark: var(--color-danger-600);
            --success-dark: color-mix(in srgb, var(--success-color) 70%, var(--color-neutral-900) 30%);

            --dark-color: var(--color-neutral-700);
            --light-color: var(--color-neutral-100);
            --text-color: var(--color-neutral-700);
            --muted-color: var(--color-neutral-500);
            --surface-color: var(--color-surface);
            --bg-color: var(--color-background);
            --border-color: var(--color-neutral-200);
            --shadow-color: rgba(15, 23, 42, 0.08);
            --sidebar-width-collapsed: 72px;
            --sidebar-bg: var(--color-surface);
            --sidebar-border-color: var(--color-neutral-200);
            --sidebar-text: var(--color-neutral-700);
            --sidebar-text-muted: var(--muted-color);
            --sidebar-accent: var(--color-primary-500);
            --sidebar-active-text: color-mix(in srgb, var(--color-primary-500) 82%, var(--color-neutral-900) 18%);
            --sidebar-menu-hover-bg: color-mix(in srgb, var(--color-primary-500) 8%, transparent);
            --sidebar-menu-active-bg: color-mix(in srgb, var(--color-primary-500) 12%, transparent);
            --sidebar-logo-bg: color-mix(in srgb, var(--color-primary-500) 14%, transparent);
            --sidebar-logout-bg: color-mix(in srgb, var(--color-neutral-700) 5%, transparent);
            --sidebar-logout-border: var(--color-neutral-200);

            /* Typography */
            --font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;

            /* Spacing scale */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;

            /* Radius scale */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;

            /* Shadow scale (mapped onto the layered elevation system below) */
            --shadow-sm: var(--elevation-2);
            --shadow-md: var(--elevation-3);
            --shadow-lg: var(--elevation-4);

            /* Misc */
            --focus-ring: color-mix(in srgb, var(--primary-color) 25%, transparent);
            --sidebar-width: 250px;
            --extended-badge-bg: color-mix(in srgb, var(--primary-color) 14%, var(--surface-color) 86%);
            --extended-badge-text: color-mix(in srgb, var(--primary-color) 80%, var(--color-neutral-900) 20%);
            --extended-row-bg: color-mix(in srgb, var(--primary-color) 10%, var(--surface-color) 90%);
            --extended-border-color: color-mix(in srgb, var(--primary-color) 45%, transparent);

            /* Status tokens */
            --livre-main: var(--status-livre);
            --livre-contrast: color-mix(in srgb, var(--status-livre) 25%, var(--color-neutral-900) 75%);
            --livre-glass: color-mix(in srgb, var(--status-livre) 16%, var(--surface-color) 84%);

            --em-uso-base: var(--status-em-uso);
            --em-uso-contrast: color-mix(in srgb, var(--status-em-uso) 35%, var(--color-neutral-900) 65%);
            --em-uso-border-color: color-mix(in srgb, var(--primary-color) 62%, var(--status-em-uso) 38%);
            --em-uso-card-bg: color-mix(in srgb, var(--primary-color) 18%, var(--surface-color) 82%);
            --em-uso-badge-bg: color-mix(in srgb, var(--status-em-uso) 60%, var(--color-neutral-900) 40%);
            --em-uso-badge-text: color-mix(in srgb, var(--color-neutral-900) 80%, var(--surface-color) 20%);
            --em-uso-icon: color-mix(in srgb, var(--status-em-uso) 75%, var(--color-neutral-900) 25%);
            --em-uso-text: color-mix(in srgb, var(--color-neutral-900) 78%, var(--surface-color) 22%);

            --proximo-main: var(--status-proximo);
            --proximo-contrast: color-mix(in srgb, var(--status-proximo) 32%, var(--color-neutral-900) 68%);
            --proximo-glow: color-mix(in srgb, var(--status-proximo) 40%, transparent);

            --vencido-main: var(--status-vencido);
            --vencido-contrast: color-mix(in srgb, var(--status-vencido) 32%, var(--color-neutral-900) 68%);
            --vencido-strong: color-mix(in srgb, var(--status-vencido) 60%, var(--color-neutral-900) 40%);

            --contingencia-main: var(--status-contingencia);
            --contingencia-contrast: color-mix(in srgb, var(--status-contingencia) 32%, var(--color-neutral-900) 68%);
            --contingencia-glass: color-mix(in srgb, var(--status-contingencia) 18%, var(--surface-color) 82%);

            /* Component tokens */
            --btn-height: 44px;
            --btn-padding-x: 20px;
            --btn-font-size: 0.95rem;
            --btn-font-weight: 600;
            --btn-radius: var(--radius-lg);
            --btn-border-width: 1px;
            --btn-shadow: var(--shadow-sm);
            --btn-focus-ring: var(--focus-ring);

            --btn-primary-bg: linear-gradient(135deg,
                color-mix(in srgb, var(--primary-color) 12%, var(--surface-color) 88%),
                color-mix(in srgb, var(--primary-color) 92%, var(--primary-dark) 8%));
            --btn-primary-bg-hover: linear-gradient(135deg,
                color-mix(in srgb, var(--primary-color) 10%, var(--surface-color) 90%),
                color-mix(in srgb, var(--primary-dark) 25%, var(--primary-color) 75%));
            --btn-primary-text: var(--color-neutral-0);
            --btn-primary-border: color-mix(in srgb, var(--primary-color) 70%, var(--surface-color) 30%);
            --btn-primary-shadow: 0 14px 28px color-mix(in srgb, var(--primary-color) 40%, transparent);

            --btn-secondary-bg: color-mix(in srgb, var(--dark-color) 65%, var(--surface-color) 35%);
            --btn-secondary-bg-hover: color-mix(in srgb, var(--dark-color) 78%, var(--color-neutral-900) 22%);
            --btn-secondary-text: var(--color-neutral-0);
            --btn-secondary-border: transparent;
            --btn-secondary-shadow: 0 12px 24px color-mix(in srgb, var(--dark-color) 25%, transparent);

            --btn-danger-bg: var(--danger-color);
            --btn-danger-bg-hover: color-mix(in srgb, var(--danger-color) 85%, var(--danger-dark) 15%);
            --btn-danger-text: var(--color-neutral-0);
            --btn-danger-border: transparent;
            --btn-danger-shadow: 0 12px 24px color-mix(in srgb, var(--danger-color) 35%, transparent);

            --btn-ghost-bg: color-mix(in srgb, var(--surface-color) 86%, transparent);
            --btn-ghost-bg-hover: color-mix(in srgb, var(--surface-color) 75%, transparent);
            --btn-ghost-text: var(--text-color);
            --btn-ghost-border: color-mix(in srgb, var(--border-color) 70%, transparent);
            --btn-ghost-shadow: none;

            --btn-cta-bg: linear-gradient(135deg,
                color-mix(in srgb, var(--primary-color) 82%, var(--surface-color) 18%),
                color-mix(in srgb, var(--primary-dark) 78%, var(--primary-color) 22%));
            --btn-cta-bg-hover: linear-gradient(135deg,
                color-mix(in srgb, var(--primary-color) 88%, var(--surface-color) 12%),
                color-mix(in srgb, var(--primary-dark) 82%, var(--primary-color) 18%));
            --btn-cta-text: var(--color-neutral-0);
            --btn-cta-border: color-mix(in srgb, var(--primary-dark) 60%, var(--surface-color) 40%);
            --btn-cta-shadow: 0 16px 36px color-mix(in srgb, var(--primary-dark) 28%, transparent);

            --card-bg: var(--surface-color);
            --card-border: color-mix(in srgb, var(--dark-color) 6%, transparent);
            --card-shadow: var(--shadow-md);
            --card-radius: var(--radius-lg);

            --modal-bg: color-mix(in srgb, var(--surface-color) 96%, #ffffff 4%);
            --modal-border: color-mix(in srgb, var(--dark-color) 10%, transparent);
            --modal-shadow: 0 30px 80px rgba(15, 23, 42, 0.22);
            --modal-radius: 20px;
            --modal-overlay: color-mix(in srgb, var(--color-neutral-900) 38%, transparent);
            --modal-overlay-blur: blur(8px);
            --modal-header-bg: linear-gradient(180deg, color-mix(in srgb, var(--surface-color) 96%, #ffffff 4%), var(--surface-color));
            --modal-footer-bg: color-mix(in srgb, var(--surface-color) 92%, var(--light-color) 8%);
            --modal-divider: color-mix(in srgb, var(--dark-color) 10%, transparent);

            --badge-radius: var(--radius-lg);
            --badge-font-size: 0.75rem;
            --badge-padding-y: 4px;
            --badge-padding-x: 12px;
            --badge-bg: color-mix(in srgb, var(--primary-color) 12%, var(--surface-color) 88%);
            --badge-text: var(--primary-color);
            --badge-border: color-mix(in srgb, var(--primary-color) 28%, transparent);

            --input-bg: var(--surface-color);
            --input-border: var(--border-color);
            --input-text: var(--text-color);
            --input-placeholder: color-mix(in srgb, var(--muted-color) 72%, var(--text-color) 28%);
            --input-radius: var(--radius-md);
            --input-focus-border: var(--primary-color);
            --input-focus-ring: var(--focus-ring);

            --table-bg: var(--surface-color);
            --table-border: color-mix(in srgb, var(--dark-color) 6%, transparent);
            --table-header-bg: color-mix(in srgb, var(--light-color) 75%, var(--surface-color) 25%);
            --table-header-text: var(--dark-color);
            --table-row-hover: color-mix(in srgb, var(--light-color) 65%, var(--surface-color) 35%);
            --table-row-border: color-mix(in srgb, var(--dark-color) 6%, transparent);

            /* Glass tokens */
            --glass-blur: blur(8px);
            --glass-bg: color-mix(in srgb, var(--surface-color) 80%, transparent);
            --glass-bg-strong: color-mix(in srgb, var(--surface-color) 90%, transparent);
            --glass-border: color-mix(in srgb, var(--color-neutral-0) 35%, transparent);
            --glass-shadow: 0 24px 44px color-mix(in srgb, var(--shadow-color) 72%, transparent);

            --login-bg: radial-gradient(ellipse 900px 500px at 50% -10%,
                color-mix(in srgb, var(--primary-color) 7%, var(--color-background) 93%),
                var(--color-background) 70%);
            --login-card-bg: var(--surface-color);
            --login-card-border: color-mix(in srgb, var(--dark-color) 8%, transparent);
            --login-title: var(--color-neutral-900);
            --login-subtitle: var(--muted-color);
            --login-label: var(--color-neutral-700);
            --login-input-bg: var(--surface-color);
            --login-input-icon: var(--muted-color);
            --login-feedback-bg: color-mix(in srgb, var(--dark-color) 3%, transparent);
            --login-help-text: var(--muted-color);
            --login-logo-filter: none;

            /* Layer scale */
            --z-base: 0;
            --z-sidebar: 210;
            --z-header: 200;
            --z-dropdown: 920;
            --z-modal-overlay: 1150;
            --z-modal-content: 1160;
            --z-overlay: 1100;
            --z-critical-overlay: 1200;
            --z-alert: 1250;

            /* === Design System 2.0 === */
            /* Typographic scale (modular, fluid) */
            --text-overline: 0.72rem;
            --text-caption: 0.8rem;
            --text-sm: 0.875rem;
            --text-body: 0.95rem;
            --text-md: 1.05rem;
            --text-h3: 1.2rem;
            --text-h2: clamp(1.35rem, 1.2rem + 0.6vw, 1.6rem);
            --text-title: clamp(1.6rem, 1.35rem + 1vw, 2rem);
            --text-display: clamp(2.2rem, 1.7rem + 2.2vw, 3.2rem);
            /* Line-height tokens */
            --leading-tight: 1.15;
            --leading-snug: 1.3;
            --leading-normal: 1.5;
            --leading-relaxed: 1.65;
            /* Letter-spacing tokens */
            --tracking-tight: -0.01em;
            --tracking-normal: 0;
            --tracking-wide: 0.02em;
            --tracking-overline: 0.08em;
            /* Font weights */
            --weight-regular: 400;
            --weight-medium: 500;
            --weight-semibold: 600;
            --weight-bold: 700;

            /* Motion system */
            --duration-instant: 0.08s;
            --duration-fast: 0.15s;
            --duration-base: 0.22s;
            --duration-slow: 0.32s;
            --duration-slower: 0.48s;
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
            --ease-entrance: cubic-bezier(0, 0, 0, 1);
            --ease-exit: cubic-bezier(0.3, 0, 1, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-colors: color var(--duration-fast) var(--ease-standard),
                background-color var(--duration-fast) var(--ease-standard),
                border-color var(--duration-fast) var(--ease-standard);
            --transition-transform: transform var(--duration-base) var(--ease-standard);

            /* Extended spacing scale */
            --space-7: 32px;
            --space-8: 40px;
            --space-9: 48px;
            --space-10: 64px;
            /* Layout rhythm */
            --page-gutter: clamp(16px, 3vw, 32px);
            --content-max: 1320px;

            /* Elevation scale (layered, ambient + directional) */
            --elevation-1: 0 1px 2px rgba(15, 23, 42, 0.06), 0 1px 3px rgba(15, 23, 42, 0.05);
            --elevation-2: 0 2px 4px rgba(15, 23, 42, 0.05), 0 4px 12px rgba(15, 23, 42, 0.08);
            --elevation-3: 0 6px 12px rgba(15, 23, 42, 0.07), 0 12px 28px rgba(15, 23, 42, 0.10);
            --elevation-4: 0 12px 24px rgba(15, 23, 42, 0.09), 0 24px 48px rgba(15, 23, 42, 0.12);
            --elevation-5: 0 24px 48px rgba(15, 23, 42, 0.12), 0 40px 80px rgba(15, 23, 42, 0.16);

            /* Semantic surface layers */
            --surface-sunken: color-mix(in srgb, var(--color-neutral-900) 4%, var(--surface-color));
            --surface-base: var(--surface-color);
            --surface-raised: var(--surface-color);
            --surface-overlay: color-mix(in srgb, var(--surface-color) 96%, #ffffff 4%);

            /* Skeleton loading */
            --skeleton-base: color-mix(in srgb, var(--color-neutral-900) 8%, var(--surface-color));
            --skeleton-sheen: color-mix(in srgb, var(--color-neutral-0) 60%, var(--skeleton-base));
        }
        [data-theme="dark"] {
            --color-primary-500: #60A5FA;
            --color-primary-600: #1D4ED8;
            --color-secondary-500: #34D399;
            --color-success-500: #6FC7A5;
            --color-warning-500: #F4A261;
            --color-danger-500: #F87171;
            --color-danger-600: #B91C1C;

            --color-neutral-0: #FFFFFF;
            --color-neutral-50: #0B1120;
            --color-neutral-100: #0B1220;
            --color-neutral-200: #1F2937;
            --color-neutral-500: #94A3B8;
            --color-neutral-700: #E5E7EB;
            --color-neutral-900: #F8FAFC;
            --color-surface: #111827;
            --color-background: #0B1120;

            --status-livre: #5FBF9C;
            --status-em-uso: #6B8BC7;
            --status-proximo: #F59E0B;
            --status-vencido: #F87171;
            --status-contingencia: #8B7AD5;

            --shadow-color: rgba(2, 6, 23, 0.65);
            --modal-bg: color-mix(in srgb, var(--color-surface) 92%, var(--color-neutral-900) 8%);
            --modal-border: color-mix(in srgb, var(--color-neutral-900) 12%, transparent);
            --modal-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
            --modal-radius: 20px;
            --modal-overlay: color-mix(in srgb, var(--color-neutral-900) 45%, transparent);
            --modal-overlay-blur: blur(8px);
            --modal-header-bg: linear-gradient(180deg, color-mix(in srgb, var(--color-surface) 94%, var(--color-neutral-900) 6%), var(--color-surface));
            --modal-footer-bg: color-mix(in srgb, var(--color-surface) 88%, var(--color-neutral-900) 12%);
            --modal-divider: color-mix(in srgb, var(--color-neutral-900) 18%, transparent);
            --login-bg: radial-gradient(ellipse 900px 500px at 50% -10%,
                color-mix(in srgb, var(--primary-color) 10%, var(--color-background) 90%),
                var(--color-background) 70%);
            --login-card-bg: var(--color-surface);
            --login-card-border: color-mix(in srgb, var(--color-neutral-0) 8%, transparent);
            --login-subtitle: var(--muted-color);
            --login-label: var(--muted-color);
            --login-input-bg: var(--color-surface);
            --login-input-icon: var(--muted-color);
            --login-feedback-bg: color-mix(in srgb, var(--color-background) 70%, transparent);
            --login-logo-filter: none;

            --glass-blur: blur(10px);
            --glass-bg: color-mix(in srgb, var(--color-surface) 70%, transparent);
            --glass-bg-strong: color-mix(in srgb, var(--color-surface) 82%, transparent);
            --glass-border: color-mix(in srgb, var(--color-neutral-900) 18%, transparent);
            --glass-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);

            /* Dark elevation: lift by lighter surface + subtle shadow */
            --elevation-1: 0 1px 2px rgba(0, 0, 0, 0.4);
            --elevation-2: 0 2px 6px rgba(0, 0, 0, 0.45), inset 0 1px 0 color-mix(in srgb, var(--color-neutral-0) 4%, transparent);
            --elevation-3: 0 6px 16px rgba(0, 0, 0, 0.5), inset 0 1px 0 color-mix(in srgb, var(--color-neutral-0) 5%, transparent);
            --elevation-4: 0 12px 32px rgba(0, 0, 0, 0.55), inset 0 1px 0 color-mix(in srgb, var(--color-neutral-0) 6%, transparent);
            --elevation-5: 0 24px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 color-mix(in srgb, var(--color-neutral-0) 7%, transparent);
            --surface-sunken: color-mix(in srgb, #000000 20%, var(--surface-color));
            --surface-raised: color-mix(in srgb, var(--color-neutral-0) 4%, var(--surface-color));
            --surface-overlay: color-mix(in srgb, var(--color-neutral-0) 6%, var(--surface-color));
            --skeleton-base: color-mix(in srgb, var(--color-neutral-0) 6%, var(--surface-color));
            --skeleton-sheen: color-mix(in srgb, var(--color-neutral-0) 12%, var(--skeleton-base));
        }

        /* === Design System 2.0 — shared components === */
        /* Accessibility: honor reduced-motion globally */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* Standardized page header (kicker + title + subtitle) */
        .page-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: var(--space-4);
            flex-wrap: wrap;
            margin-bottom: var(--space-5);
        }
        .page-head-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .page-kicker {
            font-size: var(--text-overline);
            font-weight: var(--weight-semibold);
            letter-spacing: var(--tracking-overline);
            text-transform: uppercase;
            color: var(--primary-color);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .page-head-text h3,
        .page-title {
            font-size: var(--text-h2);
            font-weight: var(--weight-bold);
            line-height: var(--leading-tight);
            letter-spacing: var(--tracking-tight);
            color: var(--text-color);
            margin: 0;
        }
        .page-subtitle {
            font-size: var(--text-sm);
            line-height: var(--leading-snug);
            color: var(--muted-color);
            margin: 0;
            max-width: 68ch;
        }
        .page-head-actions {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        /* Table toolbar: search + filters + result count */
        .table-toolbar {
            display: flex;
            align-items: flex-end;
            gap: var(--space-3);
            flex-wrap: wrap;
            padding: var(--space-4);
            border-bottom: 1px solid var(--table-row-border);
        }
        .table-toolbar .toolbar-search {
            position: relative;
            flex: 1 1 260px;
            min-width: 200px;
        }
        .table-toolbar .toolbar-search i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-color);
            font-size: var(--text-sm);
            pointer-events: none;
        }
        .table-toolbar .toolbar-search input {
            width: 100%;
            height: var(--btn-height);
            padding: 0 var(--space-4) 0 40px;
            border: 1px solid var(--input-border);
            border-radius: var(--input-radius);
            background: var(--input-bg);
            color: var(--input-text);
            font-size: var(--text-body);
            transition: var(--transition-colors), box-shadow var(--duration-fast) var(--ease-standard);
        }
        .table-toolbar .toolbar-search input:focus {
            outline: none;
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3px var(--input-focus-ring);
        }
        .toolbar-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .toolbar-field label {
            font-size: var(--text-overline);
            font-weight: var(--weight-semibold);
            letter-spacing: var(--tracking-wide);
            text-transform: uppercase;
            color: var(--muted-color);
        }
        .toolbar-field select {
            height: var(--btn-height);
            padding: 0 var(--space-3);
            border: 1px solid var(--input-border);
            border-radius: var(--input-radius);
            background: var(--input-bg);
            color: var(--input-text);
            font-size: var(--text-body);
            transition: var(--transition-colors);
        }
        .toolbar-field select:focus {
            outline: none;
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3px var(--input-focus-ring);
        }
        .toolbar-spacer { flex: 1 1 auto; }

        /* Result count chip (aria-live) */
        .results-count {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: var(--text-caption);
            font-weight: var(--weight-semibold);
            color: var(--muted-color);
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--surface-sunken);
            border: 1px solid var(--table-row-border);
            white-space: nowrap;
        }
        .results-count strong {
            color: var(--text-color);
            font-weight: var(--weight-bold);
        }

        /* Rich table states (empty / loading / error) */
        .table-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-3);
            padding: var(--space-9) var(--space-4);
            text-align: center;
            color: var(--muted-color);
        }
        .table-state.is-visible { display: flex; }
        .table-state .table-state-icon {
            width: 56px;
            height: 56px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: var(--surface-sunken);
            color: var(--muted-color);
            font-size: 1.4rem;
        }
        .table-state.table-state-error .table-state-icon {
            background: color-mix(in srgb, var(--danger-color) 14%, var(--surface-color));
            color: var(--danger-color);
        }
        .table-state-title {
            font-size: var(--text-md);
            font-weight: var(--weight-semibold);
            color: var(--text-color);
        }
        .table-state-desc {
            font-size: var(--text-sm);
            max-width: 42ch;
            line-height: var(--leading-snug);
        }

        /* Skeleton loading */
        .skeleton {
            position: relative;
            overflow: hidden;
            background: var(--skeleton-base);
            border-radius: var(--radius-sm);
        }
        .skeleton::after {
            content: "";
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg,
                transparent,
                var(--skeleton-sheen),
                transparent);
            animation: skeleton-sheen 1.4s var(--ease-standard) infinite;
        }
        @keyframes skeleton-sheen {
            100% { transform: translateX(100%); }
        }
        .skeleton-row {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: 1fr;
            gap: var(--space-4);
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--table-row-border);
        }
        .skeleton-line {
            height: 14px;
            border-radius: 6px;
        }
        .skeleton-line.short { width: 55%; }
        .skeleton-line.tiny { width: 32%; }

        /* Sticky table header for long lists */
        .table-container.is-scrollable {
            max-height: min(68vh, 720px);
            overflow-y: auto;
        }
        .table-container.is-scrollable thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            box-shadow: inset 0 -1px 0 var(--table-row-border);
        }

        /* Numeric alignment helper */
        td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

        /* Hide mobile card list when list is empty (rich empty-state takes over) */
        .table-card-list.is-hidden-empty { display: none !important; }

        /* === DS 2.0 — micro-interactions & focus (additive) === */
        .btn:not(:disabled):active { transform: translateY(1px) scale(0.995); }
        .btn-small {
            transition: var(--transition-colors),
                transform var(--duration-fast) var(--ease-standard),
                box-shadow var(--duration-fast) var(--ease-standard),
                filter var(--duration-fast) var(--ease-standard);
        }
        .btn-small:not(:disabled):hover { filter: brightness(1.05); }
        .btn-small:not(:disabled):active { transform: translateY(1px); }
        .btn:focus-visible,
        .btn-small:focus-visible,
        .filter-btn:focus-visible,
        .toolbar-field select:focus-visible,
        .results-count:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }
        /* Table rows: smooth hover using motion tokens */
        .table-container tbody tr { transition: background-color var(--duration-fast) var(--ease-standard); }

        /* Achados e Perdidos */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg);
        }
        .modal-glass {
            background: var(--glass-bg-strong);
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }
        .lf-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 8px 12px;
        }
        .lf-header {
            display: flex;

        .lf-filters {

            box-shadow: 0 16px 32px rgba(15, 23, 42, 0.06);

        .lf-filters::after {

        .lf-filters .filter-group {

        .lf-filters .filter-group label {

        .lf-filters .input-icon {

        .lf-filters .input-icon i {

        .lf-filters .input-icon input {

        .lf-filters .range-grid {

        .lf-filters .range-field {

            border-radius: 12px;
            border: 1px solid color-mix(in srgb, var(--primary-color) 20%, var(--border-color) 80%);
            background: color-mix(in srgb, var(--surface-color) 95%, rgba(59, 130, 246, 0.04));

        .lf-filters .range-field span {

        .lf-filters .range-field input[type="date"] {

        .lf-filters select,

            background: color-mix(in srgb, var(--surface-color) 95%, rgba(59, 130, 246, 0.04));
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
            font-weight: 600;
            color: color-mix(in srgb, var(--text-color) 90%, var(--muted-color) 10%);

            background-image: linear-gradient(45deg, transparent 50%, var(--primary-color) 50%), linear-gradient(135deg, var(--primary-color) 50%, transparent 50%);
            background-position: calc(100% - 18px) calc(50% - 4px), calc(100% - 12px) calc(50% - 4px);
            background-size: 6px 6px, 6px 6px;
            background-repeat: no-repeat;

        .lf-filters select:focus,
        .lf-filters input[type="date"]:focus,
        .lf-filters .input-icon:focus-within {
            border-color: color-mix(in srgb, var(--primary-color) 70%, var(--border-color) 30%);

        .lf-filters .filter-actions {

            padding: 0;
            background: transparent;
            border: none;
            box-shadow: none;

        .lf-filters .filter-actions .actions-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .lf-filters .filter-actions .btn {

        .lf-filters .btn-clean {

        .lf-filters .btn-search {

        .lf-filters .align-end {

        .lf-summary {

        .lf-summary-card {

            gap: 6px;

            background: color-mix(in srgb, var(--surface-color) 90%, rgba(255, 255, 255, 0.05));
        }
        .lf-summary-card.highlight {
            border: 1px solid color-mix(in srgb, var(--primary-color) 40%, rgba(255, 255, 255, 0.1));
            box-shadow: 0 10px 26px rgba(34, 197, 94, 0.18);
        }
        .lf-summary-label {
            font-weight: 600;
            color: var(--text-light);
        }
        .lf-summary-value {

            font-weight: 700;
        }
        .lf-summary-detail {
            color: var(--text-light);
            font-size: 0.95rem;
        }
        .lf-table .table-subtitle {
            margin-top: 4px;
            color: var(--text-light);
        }
        .lf-table .chip {
            background: color-mix(in srgb, var(--surface-color) 85%, transparent);
            border: 1px solid color-mix(in srgb, var(--surface-color) 60%, transparent);
            padding: 8px 12px;
            border-radius: 20px;
            color: var(--text-color);
        }
        #tabela-achados {
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        #tabela-achados thead th {
            background: color-mix(in srgb, var(--light-color) 80%, white 20%);

            top: 0;

        }
        #tabela-achados th,
        #tabela-achados td {

        }
        #tabela-achados th:not(:last-child)::after,
        #tabela-achados td:not(:last-child)::after {
            content: "";
            position: absolute;
            top: 10px;
            bottom: 10px;

            animation: spin 0.7s linear infinite;

        .lf-actions {
            display: flex;

        }
        .lf-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;

        @keyframes spin {

        .mov-item-flag.remocao-indicador {

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        /* Garante que inputs de arquivo usados em modais fiquem ocultos
           quando estilizados por um botão customizado. */
        .swal2-popup input[type="file"].sr-only {
            position: absolute !important;
            width: 1px !important;
            height: 1px !important;
            padding: 0 !important;
            margin: -1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            white-space: nowrap !important;
            border: 0 !important;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
            font-size: var(--text-body);
            line-height: var(--leading-normal);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        body.nav-open {
            overflow: hidden;
            touch-action: auto;
        }
        html, body, .app-shell, .main-content, #pages-container, .page {
            width: 100%;
            max-width: 100%;
        }
        /* overflow-x aqui (não em body): quando um elemento tem só um eixo
           não-visible, o outro é promovido para "auto" pela spec CSS — e se
           fosse o body a ficar com eixo misto, esse overflow se propagaria
           para o viewport (o html está "visible"), quebrando/travando o
           scroll real da página no mobile. Deixando em html, é ele mesmo
           quem já rege o viewport, sem propagação nem duplo scroller. */
        html {
            overflow-x: hidden;
        }
        body.modal-open {
            overflow: hidden;
            touch-action: auto;
        }
        .fa-user-clock, .fas.fa-user-clock {
            color: inherit;
        }

        .sidebar-logout-button {

            align-items: center;
            justify-content: flex-start;

            padding: 12px 16px;

            background: color-mix(in srgb, var(--color-danger-500) 10%, transparent);
            border-color: color-mix(in srgb, var(--color-danger-500) 35%, transparent);
            color: var(--color-danger-500);
        }
        .sidebar-logout-button i {
            font-size: 1rem;
        }
        /* Grupos do menu (rótulo visível no drawer mobile; divisor no rail) */

            padding: 14px 20px 4px;
        }
        .sidebar-group-label {
            display: block;
            font-size: 0.68rem;
            font-weight: 700;

        /* Ações pessoais no pé da sidebar (tema, notificações, avatar) */
        .sidebar-footer .rail-action {

        .sidebar-footer .rail-action i {
            width: 22px;
            text-align: center;
            font-size: 1.05rem;
            color: var(--sidebar-text-muted);
        }
        .sidebar-footer .rail-action:hover i {
            color: var(--sidebar-active-text);
        }
        .rail-action-label {
            flex: 1;
        }
        /* Tooltip do rail (elemento único no body, posicionado por JS) */
        .rail-tooltip {
            position: fixed;
            z-index: calc(var(--z-dropdown) + 10);
            background: var(--color-neutral-700);
            color: var(--color-neutral-0);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity 0.12s ease, transform 0.12s ease;
            box-shadow: 0 8px 20px color-mix(in srgb, var(--shadow-color) 90%, transparent);
        }
        .rail-tooltip.visible {
            opacity: 1;
            transform: translateX(0);
        }
        [data-theme="dark"] .rail-tooltip {
            background: var(--color-neutral-200);
            color: var(--color-neutral-900);
        }
        /* Main Content */
        .app-shell {
            display: flex;
            width: 100%;
        }
        .hidden {
            display: none !important;
        }
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 20px;
            transition: margin-left 0.3s;
            overflow-x: hidden;
            overflow-y: hidden;
        }
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid color-mix(in srgb, var(--dark-color) 8%, transparent);
            flex-wrap: nowrap;
            gap: 16px;
            position: relative;
            z-index: var(--z-header);
        }
        .sidebar-toggle {
            display: none;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            border: 1px solid color-mix(in srgb, var(--dark-color) 12%, transparent);
            background: white;
            color: var(--dark-color);
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
        }
        [data-theme="dark"] .sidebar-toggle {
            background: color-mix(in srgb, var(--color-neutral-900) 18%, var(--color-surface) 82%);
            border-color: color-mix(in srgb, var(--color-neutral-900) 28%, transparent);
            color: var(--color-neutral-0);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
        }
        .sidebar-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
        }
        [data-theme="dark"] .sidebar-toggle:hover {
            background: color-mix(in srgb, var(--color-neutral-900) 28%, var(--color-surface) 72%);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.45);
        }
        .sidebar-toggle i {
            font-size: 1.1rem;
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            min-width: 0;
        }
        .header-title h1 {
            font-size: 1.8rem;
            color: var(--dark-color);
        }
        .header-actions {
            display: flex;
            align-items: center;
            flex-direction: row;
            gap: 8px;
            flex-wrap: nowrap;
        }
        .header-greeting {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0;
            background: transparent;
            color: var(--muted-color);
            font-weight: 500;
            min-width: 0;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--livre-main);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--livre-main) 22%, transparent);
            flex-shrink: 0;
        }
        .greeting-role {
            color: var(--muted-color);
            font-size: 0.88rem;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            max-width: 240px;
            display: inline-block;
        }
        .greeting-shift {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 2px 7px;
            border-radius: 999px;
            background: color-mix(in srgb, var(--primary-color) 12%, transparent);
            color: color-mix(in srgb, var(--primary-color) 80%, var(--text-color) 20%);
        }
        .header-selectors {
            display: flex;
            align-items: stretch;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1 1 420px;
            justify-content: flex-end;
            min-width: 0;
        }
        .selector-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1 1 220px;
            min-width: 0;
        }
        .selector-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted-color);
        }
        .selector-control {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--surface-color);
            box-shadow: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            min-width: 0;
            max-width: 100%;
        }
        .selector-control:hover {
            border-color: color-mix(in srgb, var(--primary-color) 60%, var(--surface-color) 40%);
            box-shadow: var(--shadow-sm);
        }
        .selector-control.open,
        .selector-control:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--focus-ring);
            z-index: calc(var(--z-dropdown) + 1);
        }
        .selector-icon {
            color: var(--primary-color);
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .selector-trigger {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 0;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--dark-color);
            border-radius: 10px;
            transition: background-color 0.2s ease;
        }
        .selector-trigger:focus {
            outline: none;
        }
        .selector-trigger:focus-visible,
        .selector-trigger:hover {
            background: color-mix(in srgb, var(--primary-color) 10%, white 90%);
        }
        [data-theme="dark"] .selector-trigger:focus-visible,
        [data-theme="dark"] .selector-trigger:hover {
            background: color-mix(in srgb, var(--primary-color) 18%, var(--surface-color) 82%);
        }
        .selector-trigger-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            min-width: 0;
            overflow: hidden;
        }
        .selector-trigger-label {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-color);
            line-height: 1.2;
            word-break: break-word;
        }
        .selector-trigger-description {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--muted-color);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .selector-arrow {
            color: var(--muted-color);
            font-size: 0.9rem;
            transition: transform 0.2s ease, color 0.2s ease;
        }
        .selector-control.open .selector-arrow,
        .selector-control:focus-within .selector-arrow,
        .selector-control.open .selector-icon,
        .selector-control:focus-within .selector-icon {
            color: var(--primary-dark);
        }
        .selector-control.open .selector-arrow {
            transform: rotate(180deg);
        }
        .selector-dropdown {
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            transform: translateY(-8px);
            min-width: min(320px, calc(100% + 48px));
            width: max(260px, 100%);
            max-width: 360px;
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            border: 1px solid color-mix(in srgb, var(--primary-color) 12%, var(--border-color) 88%);
            box-shadow: var(--shadow-lg);
            padding: 18px 16px;
            max-height: min(320px, calc(70vh - 32px));
            overflow-y: auto;
            overscroll-behavior: contain;
            opacity: 0;
            pointer-events: none;
            /* fechado, sai do hit-test e do tab order (não só transparente) */
            visibility: hidden;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0.2s;
            z-index: var(--z-dropdown);
        }
        .selector-dropdown::before,
        .selector-dropdown::after {
            content: "";
            position: absolute;
            top: -10px;
            left: 24px;
            transform: none;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            pointer-events: none;
        }
        .header-selector-pair .selector-dropdown {
            left: auto;
            right: 0;
        }
        .header-selector-pair .selector-dropdown::before,
        .header-selector-pair .selector-dropdown::after {
            left: auto;
            right: 24px;
        }
        .selector-dropdown::before {
            border-bottom: 10px solid color-mix(in srgb, var(--primary-color) 12%, var(--border-color) 88%);
        }
        .selector-dropdown::after {
            top: -9px;
            border-bottom: 10px solid var(--surface-color);
        }
        .selector-control.open .selector-dropdown {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
            transform: translateY(0);
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s;
            z-index: var(--z-dropdown);
        }
        .selector-options {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
        }
        .selector-option {
            width: 100%;
        }
        .selector-option-button {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            background: transparent;
            border: none;
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-color);
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }
        .selector-option-button:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--focus-ring);
        }
        .selector-option-button:hover:not(.is-disabled),
        .selector-option-button:focus-visible:not(.is-disabled) {
            background: color-mix(in srgb, var(--primary-color) 18%, var(--surface-color) 82%);
            transform: translateX(2px);
            box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--primary-color) 30%, var(--surface-color) 70%);
        }
        .selector-option-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .selector-option-icon,
        .selector-option-bullet {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: color-mix(in srgb, var(--primary-color) 12%, var(--surface-color) 88%);
            color: var(--primary-dark);
            font-size: 1rem;
            flex-shrink: 0;
        }
        .selector-option-bullet {
            font-weight: 700;
            text-transform: uppercase;
        }
        .selector-option-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            align-items: flex-start;
        }
        .selector-option-label {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .selector-option-description {
            font-size: 0.78rem;
            color: color-mix(in srgb, var(--muted-color) 85%, var(--surface-color) 15%);
            max-width: 260px;
        }
        .selector-option-check {
            color: var(--primary-dark);
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .selector-option-button.is-selected {
            background: color-mix(in srgb, var(--primary-color) 24%, var(--surface-color) 76%);
            box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--primary-color) 40%, var(--surface-color) 60%);
        }
        .selector-option-button.is-selected .selector-option-check {
            opacity: 1;
        }
        .selector-option-button.is-disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }
        .selector-option-button.is-disabled .selector-option-description {
            color: color-mix(in srgb, var(--muted-color) 64%, var(--surface-color) 36%);
        }
        .selector-options::-webkit-scrollbar {
            width: 8px;
        }
        .selector-options::-webkit-scrollbar-track {
            background: color-mix(in srgb, var(--surface-color) 70%, var(--bg-color) 30%);
            border-radius: 10px;
        }
        .selector-options::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--primary-color) 45%, white 55%);
            border-radius: 10px;
        }
        .selector-native-input {
            position: absolute;
            inset: 0;
            width: 0;
            height: 0;
            opacity: 0;
            pointer-events: none;
        }
        /* ── Pill de contexto (Perfil · Unidade) ── */
        .header-context {
            position: relative;
            margin-left: auto;
            flex-shrink: 0;
            z-index: var(--z-dropdown);
        }
        .context-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: var(--surface-color);
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            max-width: min(460px, 60vw);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }
        .context-pill > i {
            color: var(--muted-color);
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .context-pill-text {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .context-pill-part {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .context-pill-part#context-pill-profile {
            color: color-mix(in srgb, var(--primary-color) 80%, var(--text-color) 20%);
        }
        .context-pill-sep {
            color: var(--muted-color);
            flex-shrink: 0;
        }
        .context-pill-arrow {
            transition: transform 0.2s ease;
        }
        .context-pill:hover {
            border-color: color-mix(in srgb, var(--primary-color) 45%, var(--border-color) 55%);
            box-shadow: var(--shadow-sm);
        }
        .context-pill:focus-visible {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }
        .header-context.open .context-pill {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }
        .header-context.open .context-pill-arrow {
            transform: rotate(180deg);
        }
        .context-popover {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: min(400px, calc(100vw - 32px));
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            opacity: 0;
            pointer-events: none;
            /* visibility:hidden tira o popover fechado do hit-test e da ordem
               de tabulação por inteiro, mesmo que um descendente tente
               reativar pointer-events. */
            visibility: hidden;
            transform: translateY(-6px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s linear 0.18s;
        }
        .header-context.open .context-popover {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
            transform: translateY(0);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s;
        }
        .context-popover-header {
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted-color);
        }
        .context-section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted-color);
        }
        /* Seletores dentro do popover: listas inline sempre abertas */
        .context-popover .selector-control {
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
            padding: 0;
            border: none;
            background: transparent;
            box-shadow: none;
        }
        .context-popover .selector-control.open,
        .context-popover .selector-control:focus-within {
            border: none;
            box-shadow: none;
        }
        .context-popover .selector-trigger {
            pointer-events: none;
            padding: 2px 2px 4px;
            justify-content: flex-start;
            gap: 10px;
        }
        .context-popover .selector-trigger-description {
            display: none;
        }
        .context-popover .selector-arrow {
            display: none;
        }
        .context-popover .selector-control .selector-dropdown {
            position: static;
            opacity: 1;
            /* inherit (não auto/visible): a lista inline precisa seguir o estado
               do popover. Com "auto"/"visible" fixos, ela reativava o hit-test
               dentro do popover FECHADO (opacity:0), criando um painel invisível
               de ~400x510px abaixo do header que engolia todos os toques —
               principal causa do touch "morto" no Monitor. */
            pointer-events: inherit;
            visibility: inherit;
            transform: none;
            border: none;
            box-shadow: none;
            padding: 0;
            width: 100%;
            min-width: 0;
            max-width: none;
            background: transparent;
        }
        .context-popover .selector-dropdown::before,
        .context-popover .selector-dropdown::after {
            content: none;
        }
        .context-popover .selector-options {
            gap: 4px;
            max-height: 236px;
        }
        .context-popover .selector-option-button {
            padding: 9px 10px;
        }
        @media (max-width: 640px) {
            .context-popover {
                position: fixed;
                left: 12px;
                right: 12px;
                top: 70px;
                width: auto;
                max-height: calc(100vh - 90px);
                overflow-y: auto;
            }
            .context-pill {
                max-width: min(320px, 62vw);
            }
            .context-pill-part#context-pill-profile,
            .context-pill-sep {
                display: none;
            }
        }
        /* Ações pessoais (agora no pé do rail): base ghost */
        .theme-toggle,
        .notification-bell {
            position: relative;
            cursor: pointer;
            font-size: 1rem;
            color: var(--sidebar-text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            transition: background-color 0.15s ease, color 0.15s ease;
        }
        .notification-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background-color: var(--danger-color);
            color: white;
            border-radius: 50%;
            min-width: 17px;
            height: 17px;
            padding: 0 4px;
            font-size: 0.68rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        /* SweetAlert custom form layout */
        .swal2-container {
            z-index: var(--z-alert) !important;
        }

        .swal2-popup {
            z-index: calc(var(--z-alert) + 1) !important;
            border-radius: 22px;
            background: var(--modal-bg);
            color: var(--text-color);
            font-family: var(--font-family);
        }
        .swal2-title {
            color: var(--text-color);
            letter-spacing: -0.01em;
            font-weight: 700;
        }
        .swal2-html-container {
            color: color-mix(in srgb, var(--text-color) 88%, transparent);
        }
        .swal2-styled {
            border-radius: 999px !important;
            font-weight: 600 !important;
            padding: 11px 22px !important;
            font-family: inherit !important;
        }
        .swal2-styled:focus-visible {
            box-shadow: 0 0 0 4px var(--focus-ring) !important;
        }
        /* Resumo em linhas rótulo/valor dentro dos modais Swal */
        .resumo-list {
            display: flex;
            flex-direction: column;
            text-align: left;
            margin: 4px 2px 0;
            border: 1px solid color-mix(in srgb, var(--border-color) 80%, transparent);
            border-radius: 14px;
            padding: 4px 14px;
            background: color-mix(in srgb, var(--light-color) 35%, var(--surface-color) 65%);
        }
        [data-theme="dark"] .resumo-list {
            background: color-mix(in srgb, var(--color-background) 35%, var(--surface-color) 65%);
        }
        .resumo-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 16px;
            padding: 9px 0;
            border-bottom: 1px solid color-mix(in srgb, var(--border-color) 55%, transparent);
        }
        .resumo-row:last-child {
            border-bottom: none;
        }
        .resumo-label {
            color: var(--muted-color);
            font-size: 0.85rem;
            font-weight: 500;
            flex-shrink: 0;
        }
        .resumo-value {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-color);
            text-align: right;
            word-break: break-word;
            min-width: 0;
        }
        .resumo-confirmacao-texto {
            margin: 14px 4px 0;
            font-size: 0.92rem;
            color: var(--muted-color);
            text-align: center;
        }

        /* Aviso simples e discreto (sucesso/erro/aviso) — pensado para uso em tablet.
           Sem backdrop, sem bloquear a tela e sem sensação de "recarregar". */
        #toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast-simples {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 320px;
            padding: 10px 14px;
            background: #ffffff;
            color: #1f2937;
            font-size: 0.9rem;
            line-height: 1.3;
            border-radius: 10px;
            border-left: 4px solid #94a3b8;
            box-shadow: 0 6px 20px rgba(15, 23, 42, 0.15);
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .toast-simples.visivel {
            opacity: 1;
            transform: translateY(0);

        .login-feedback.is-error {

            background: color-mix(in srgb, var(--success-color) 14%, transparent);
        }
        .login-feedback.is-success::before {

            transform: scale(1);

        .login-link-button:hover {

        /* Cards Hero */

            max-width: fit-content;
            border-radius: 999px;
            background: color-mix(in srgb, var(--surface-color) 92%, var(--bg-color) 8%);
            border: 1px solid color-mix(in srgb, var(--border-color) 80%, transparent);
            box-shadow: 0 10px 30px color-mix(in srgb, var(--shadow-color) 70%, transparent);
        }

            align-items: center;

            text-transform: uppercase;
            color: var(--muted-color);
            white-space: nowrap;
        }
        .estado-geral-titulo i {
            color: color-mix(in srgb, var(--primary-color) 75%, var(--muted-color) 25%);

        .estado-geral-chips {
            display: flex;
            align-items: stretch;
            flex-wrap: wrap;
            gap: 4px;
        }
        .cards-hero .card {

            align-items: center;
            gap: 7px;
            padding: 8px 14px;

            font-family: inherit;
            font-size: 0.92rem;

        }
        .estado-geral-chips .card + .card::before {

            background: color-mix(in srgb, var(--border-color) 85%, transparent);
        }
        .cards-hero .card:hover,
        .cards-hero .card:focus-visible {
            transform: translateY(-1px);
            outline: none;
        }
        .cards-hero .card:focus-visible {
