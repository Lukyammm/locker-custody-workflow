<style>
        :root {
            /* Core palette */
            --color-primary-500: #3B82F6;
            --color-primary-600: #1D4ED8;
            --color-secondary-500: #10B981;
            --color-success-500: #5BA98C;
            --color-warning-500: #C67B2A;
            --color-danger-500: #8B1E3A;
            --color-danger-600: #6A1227;

            /* Neutrals */
            --color-neutral-0: #FFFFFF;
            --color-neutral-50: #F9FAFB;
            --color-neutral-100: #F3F4F6;
            --color-neutral-200: #E5E7EB;
            --color-neutral-500: #6B7280;
            --color-neutral-700: #1F2937;
            --color-neutral-900: #0F172A;
            --color-surface: #FFFFFF;
            --color-background: #F9FAFB;

            /* Status palette */
            --status-livre: #5BA98C;
            --status-em-uso: #4F6F97;
            --status-proximo: #C67B2A;
            --status-vencido: #8B1E3A;
            --status-contingencia: #52418F;

            /* Legacy mappings */
            --primary-color: var(--color-primary-500);
            --secondary-color: var(--color-secondary-500);
            --success-color: var(--color-success-500);
            --warning-color: var(--color-warning-500);
            --danger-color: var(--color-danger-500);
            --primary-dark: var(--color-primary-600);
            --danger-dark: var(--color-danger-600);
            --success-dark: color-mix(in srgb, var(--success-color) 70%, var(--color-neutral-900) 30%);

            --dark-color: var(--color-neutral-700);
            --light-color: var(--color-neutral-100);
            --text-color: var(--color-neutral-700);
            --muted-color: var(--color-neutral-500);
            --surface-color: var(--color-surface);
            --bg-color: var(--color-background);
            --border-color: var(--color-neutral-200);
            --shadow-color: rgba(15, 23, 42, 0.08);
            --sidebar-width-collapsed: 88px;
            --sidebar-bg: var(--color-surface);
            --sidebar-border-color: var(--color-neutral-200);
            --sidebar-text: var(--color-neutral-700);
            --sidebar-text-muted: var(--muted-color);
            --sidebar-accent: var(--color-primary-500);
            --sidebar-active-text: color-mix(in srgb, var(--color-primary-500) 82%, var(--color-neutral-900) 18%);
            --sidebar-menu-hover-bg: color-mix(in srgb, var(--color-primary-500) 8%, transparent);
            --sidebar-menu-active-bg: color-mix(in srgb, var(--color-primary-500) 12%, transparent);
            --sidebar-logo-bg: color-mix(in srgb, var(--color-primary-500) 14%, transparent);
            --sidebar-logout-bg: color-mix(in srgb, var(--color-neutral-700) 5%, transparent);
            --sidebar-logout-border: var(--color-neutral-200);

            /* Typography */
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;

            /* Spacing scale */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;

            /* Radius scale */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;

            /* Shadow scale */
            --shadow-sm: 0 4px 12px var(--shadow-color);
            --shadow-md: 0 12px 28px var(--shadow-color);
            --shadow-lg: 0 24px 48px var(--shadow-color);

            /* Misc */
            --focus-ring: color-mix(in srgb, var(--primary-color) 25%, transparent);
            --sidebar-width: 250px;
            --extended-badge-bg: color-mix(in srgb, var(--primary-color) 14%, var(--surface-color) 86%);
            --extended-badge-text: color-mix(in srgb, var(--primary-color) 80%, var(--color-neutral-900) 20%);
            --extended-row-bg: color-mix(in srgb, var(--primary-color) 10%, var(--surface-color) 90%);
            --extended-border-color: color-mix(in srgb, var(--primary-color) 45%, transparent);

            /* Status tokens */
            --livre-main: var(--status-livre);
            --livre-contrast: color-mix(in srgb, var(--status-livre) 25%, var(--color-neutral-900) 75%);
            --livre-glass: color-mix(in srgb, var(--status-livre) 16%, var(--surface-color) 84%);

            --em-uso-base: var(--status-em-uso);
            --em-uso-contrast: color-mix(in srgb, var(--status-em-uso) 35%, var(--color-neutral-900) 65%);
            --em-uso-border-color: color-mix(in srgb, var(--primary-color) 62%, var(--status-em-uso) 38%);
            --em-uso-card-bg: color-mix(in srgb, var(--primary-color) 18%, var(--surface-color) 82%);
            --em-uso-badge-bg: color-mix(in srgb, var(--status-em-uso) 60%, var(--color-neutral-900) 40%);
            --em-uso-badge-text: color-mix(in srgb, var(--color-neutral-900) 80%, var(--surface-color) 20%);
            --em-uso-icon: color-mix(in srgb, var(--status-em-uso) 75%, var(--color-neutral-900) 25%);
            --em-uso-text: color-mix(in srgb, var(--color-neutral-900) 78%, var(--surface-color) 22%);

            --proximo-main: var(--status-proximo);
            --proximo-contrast: color-mix(in srgb, var(--status-proximo) 32%, var(--color-neutral-900) 68%);
            --proximo-glow: color-mix(in srgb, var(--status-proximo) 40%, transparent);

            --vencido-main: var(--status-vencido);
            --vencido-contrast: color-mix(in srgb, var(--status-vencido) 32%, var(--color-neutral-900) 68%);
            --vencido-strong: color-mix(in srgb, var(--status-vencido) 60%, var(--color-neutral-900) 40%);

            --contingencia-main: var(--status-contingencia);
            --contingencia-contrast: color-mix(in srgb, var(--status-contingencia) 32%, var(--color-neutral-900) 68%);
            --contingencia-glass: color-mix(in srgb, var(--status-contingencia) 18%, var(--surface-color) 82%);

            /* Component tokens */
            --btn-height: 44px;
            --btn-padding-x: 20px;
            --btn-font-size: 0.95rem;
            --btn-font-weight: 600;
            --btn-radius: var(--radius-lg);
            --btn-border-width: 1px;
            --btn-shadow: var(--shadow-sm);
            --btn-focus-ring: var(--focus-ring);

            --btn-primary-bg: linear-gradient(135deg,
                color-mix(in srgb, var(--primary-color) 12%, var(--surface-color) 88%),
                color-mix(in srgb, var(--primary-color) 92%, var(--primary-dark) 8%));
            --btn-primary-bg-hover: linear-gradient(135deg,
                color-mix(in srgb, var(--primary-color) 10%, var(--surface-color) 90%),
                color-mix(in srgb, var(--primary-dark) 25%, var(--primary-color) 75%));
            --btn-primary-text: var(--color-neutral-0);
            --btn-primary-border: color-mix(in srgb, var(--primary-color) 70%, var(--surface-color) 30%);
            --btn-primary-shadow: 0 14px 28px color-mix(in srgb, var(--primary-color) 40%, transparent);

            --btn-secondary-bg: color-mix(in srgb, var(--dark-color) 65%, var(--surface-color) 35%);
            --btn-secondary-bg-hover: color-mix(in srgb, var(--dark-color) 78%, var(--color-neutral-900) 22%);
            --btn-secondary-text: var(--color-neutral-0);
            --btn-secondary-border: transparent;
            --btn-secondary-shadow: 0 12px 24px color-mix(in srgb, var(--dark-color) 25%, transparent);

            --btn-danger-bg: var(--danger-color);
            --btn-danger-bg-hover: color-mix(in srgb, var(--danger-color) 85%, var(--danger-dark) 15%);
            --btn-danger-text: var(--color-neutral-0);
            --btn-danger-border: transparent;
            --btn-danger-shadow: 0 12px 24px color-mix(in srgb, var(--danger-color) 35%, transparent);

            --btn-ghost-bg: color-mix(in srgb, var(--surface-color) 86%, transparent);
            --btn-ghost-bg-hover: color-mix(in srgb, var(--surface-color) 75%, transparent);
            --btn-ghost-text: var(--text-color);
            --btn-ghost-border: color-mix(in srgb, var(--border-color) 70%, transparent);
            --btn-ghost-shadow: none;

            --btn-cta-bg: linear-gradient(135deg,
                color-mix(in srgb, var(--primary-color) 82%, var(--surface-color) 18%),
                color-mix(in srgb, var(--primary-dark) 78%, var(--primary-color) 22%));
            --btn-cta-bg-hover: linear-gradient(135deg,
                color-mix(in srgb, var(--primary-color) 88%, var(--surface-color) 12%),
                color-mix(in srgb, var(--primary-dark) 82%, var(--primary-color) 18%));
            --btn-cta-text: var(--color-neutral-0);
            --btn-cta-border: color-mix(in srgb, var(--primary-dark) 60%, var(--surface-color) 40%);
            --btn-cta-shadow: 0 16px 36px color-mix(in srgb, var(--primary-dark) 28%, transparent);

            --card-bg: var(--surface-color);
            --card-border: color-mix(in srgb, var(--dark-color) 6%, transparent);
            --card-shadow: var(--shadow-md);
            --card-radius: var(--radius-lg);

            --modal-bg: color-mix(in srgb, var(--surface-color) 96%, #ffffff 4%);
            --modal-border: color-mix(in srgb, var(--dark-color) 10%, transparent);
            --modal-shadow: 0 30px 80px rgba(15, 23, 42, 0.22);
            --modal-radius: 20px;
            --modal-overlay: color-mix(in srgb, var(--color-neutral-900) 38%, transparent);
            --modal-overlay-blur: blur(8px);
            --modal-header-bg: linear-gradient(180deg, color-mix(in srgb, var(--surface-color) 96%, #ffffff 4%), var(--surface-color));
            --modal-footer-bg: color-mix(in srgb, var(--surface-color) 92%, var(--light-color) 8%);
            --modal-divider: color-mix(in srgb, var(--dark-color) 10%, transparent);

            --badge-radius: var(--radius-lg);
            --badge-font-size: 0.75rem;
            --badge-padding-y: 4px;
            --badge-padding-x: 12px;
            --badge-bg: color-mix(in srgb, var(--primary-color) 12%, var(--surface-color) 88%);
            --badge-text: var(--primary-color);
            --badge-border: color-mix(in srgb, var(--primary-color) 28%, transparent);

            --input-bg: var(--surface-color);
            --input-border: var(--border-color);
            --input-text: var(--text-color);
            --input-placeholder: color-mix(in srgb, var(--muted-color) 72%, var(--text-color) 28%);
            --input-radius: var(--radius-md);
            --input-focus-border: var(--primary-color);
            --input-focus-ring: var(--focus-ring);

            --table-bg: var(--surface-color);
            --table-border: color-mix(in srgb, var(--dark-color) 6%, transparent);
            --table-header-bg: color-mix(in srgb, var(--light-color) 75%, var(--surface-color) 25%);
            --table-header-text: var(--dark-color);
            --table-row-hover: color-mix(in srgb, var(--light-color) 65%, var(--surface-color) 35%);
            --table-row-border: color-mix(in srgb, var(--dark-color) 6%, transparent);

            /* Glass tokens */
            --glass-blur: blur(8px);
            --glass-bg: color-mix(in srgb, var(--surface-color) 80%, transparent);
            --glass-bg-strong: color-mix(in srgb, var(--surface-color) 90%, transparent);
            --glass-border: color-mix(in srgb, var(--color-neutral-0) 35%, transparent);
            --glass-shadow: 0 24px 44px color-mix(in srgb, var(--shadow-color) 72%, transparent);

            --login-bg: radial-gradient(ellipse 900px 500px at 50% -10%,
                color-mix(in srgb, var(--primary-color) 7%, var(--color-background) 93%),
                var(--color-background) 70%);
            --login-card-bg: var(--surface-color);
            --login-card-border: color-mix(in srgb, var(--dark-color) 8%, transparent);
            --login-title: var(--color-neutral-900);
            --login-subtitle: var(--muted-color);
            --login-label: var(--color-neutral-700);
            --login-input-bg: var(--surface-color);
            --login-input-icon: var(--muted-color);
            --login-feedback-bg: color-mix(in srgb, var(--dark-color) 3%, transparent);
            --login-help-text: var(--muted-color);
            --login-logo-filter: none;

            /* Layer scale */
            --z-base: 0;
            --z-sidebar: 210;
            --z-header: 200;
            --z-dropdown: 920;
            --z-modal-overlay: 1150;
            --z-modal-content: 1160;
            --z-overlay: 1100;
            --z-critical-overlay: 1200;
            --z-alert: 1250;
        }
        [data-theme="dark"] {
            --color-primary-500: #60A5FA;
            --color-primary-600: #1D4ED8;
            --color-secondary-500: #34D399;
            --color-success-500: #6FC7A5;
            --color-warning-500: #F4A261;
            --color-danger-500: #F87171;
            --color-danger-600: #B91C1C;

            --color-neutral-0: #FFFFFF;
            --color-neutral-50: #0B1120;
            --color-neutral-100: #0B1220;
            --color-neutral-200: #1F2937;
            --color-neutral-500: #94A3B8;
            --color-neutral-700: #E5E7EB;
            --color-neutral-900: #F8FAFC;
            --color-surface: #111827;
            --color-background: #0B1120;

            --status-livre: #5FBF9C;
            --status-em-uso: #6B8BC7;
            --status-proximo: #F59E0B;
            --status-vencido: #F87171;
            --status-contingencia: #8B7AD5;

            --shadow-color: rgba(2, 6, 23, 0.65);
            --modal-bg: color-mix(in srgb, var(--color-surface) 92%, var(--color-neutral-900) 8%);
            --modal-border: color-mix(in srgb, var(--color-neutral-900) 12%, transparent);
            --modal-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
            --modal-radius: 20px;
            --modal-overlay: color-mix(in srgb, var(--color-neutral-900) 45%, transparent);
            --modal-overlay-blur: blur(8px);
            --modal-header-bg: linear-gradient(180deg, color-mix(in srgb, var(--color-surface) 94%, var(--color-neutral-900) 6%), var(--color-surface));
            --modal-footer-bg: color-mix(in srgb, var(--color-surface) 88%, var(--color-neutral-900) 12%);
            --modal-divider: color-mix(in srgb, var(--color-neutral-900) 18%, transparent);
            --login-bg: radial-gradient(ellipse 900px 500px at 50% -10%,
                color-mix(in srgb, var(--primary-color) 10%, var(--color-background) 90%),
                var(--color-background) 70%);
            --login-card-bg: var(--color-surface);
            --login-card-border: color-mix(in srgb, var(--color-neutral-0) 8%, transparent);
            --login-subtitle: var(--muted-color);
            --login-label: var(--muted-color);
            --login-input-bg: var(--color-surface);
            --login-input-icon: var(--muted-color);
            --login-feedback-bg: color-mix(in srgb, var(--color-background) 70%, transparent);
            --login-logo-filter: none;

            --glass-blur: blur(10px);
            --glass-bg: color-mix(in srgb, var(--color-surface) 70%, transparent);
            --glass-bg-strong: color-mix(in srgb, var(--color-surface) 82%, transparent);
            --glass-border: color-mix(in srgb, var(--color-neutral-900) 18%, transparent);
            --glass-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
        }
                radial-gradient(circle 2px   at 22px 88px,  #002776 100%, transparent 100%),
                radial-gradient(circle 2px   at 62px 100px, #009C3B 100%, transparent 100%),
                radial-gradient(circle 2.5px at 98px 44px,  #FFDF00 100%, transparent 100%);
            background-size: 155px 118px;
            background-repeat: repeat;
        }

        /* Achados e Perdidos */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg);
        }
        .modal-glass {
            background: var(--glass-bg-strong);
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }
        .lf-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 8px 12px;
        }
        .lf-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid color-mix(in srgb, var(--surface-color) 60%, transparent);
        }
        .lf-kicker {
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }
        .lf-subtitle {
            margin: 6px 0 0;
            color: var(--text-light);
        }
        .lf-header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .lf-filters {
            display: grid;
            grid-template-columns: 3fr 1fr 2fr auto;
            gap: 14px;
            padding: 18px;
            border: 1px solid color-mix(in srgb, var(--primary-color) 14%, transparent);
            border-radius: 16px;
            background: linear-gradient(135deg, color-mix(in srgb, var(--surface-color) 92%, white 8%), color-mix(in srgb, var(--primary-color) 6%, var(--surface-color) 94%));
            box-shadow: 0 16px 32px rgba(15, 23, 42, 0.06);
            position: relative;
            overflow: hidden;
            align-items: end;
        }
        .lf-filters::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at 12% 20%, color-mix(in srgb, var(--primary-color) 18%, transparent) 0, transparent 38%),
                        radial-gradient(circle at 86% 80%, color-mix(in srgb, var(--secondary-color) 14%, transparent) 0, transparent 36%);
            opacity: 0.28;
        }
        .lf-filters .filter-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            background: color-mix(in srgb, var(--surface-color) 88%, rgba(255, 255, 255, 0.12));
            border: 1px solid color-mix(in srgb, var(--border-color) 60%, transparent);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }
        .lf-filters .filter-group label {
            font-size: 0.85rem;
            letter-spacing: 0.02em;
            color: color-mix(in srgb, var(--text-color) 86%, var(--muted-color) 14%);
            font-weight: 700;
        }
        .lf-filters .input-icon {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid color-mix(in srgb, var(--primary-color) 20%, var(--border-color) 80%);
            background: color-mix(in srgb, var(--surface-color) 95%, rgba(59, 130, 246, 0.04));
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
        }
        .lf-filters .input-icon i {
            color: color-mix(in srgb, var(--primary-color) 60%, var(--muted-color) 40%);
        }
        .lf-filters .input-icon input {
            border: none;
            padding: 8px 0;
            background: transparent;
            width: 100%;
            outline: none;
            font-size: 0.95rem;
        }
        .lf-filters .range-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
        }
        .lf-filters .range-field {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid color-mix(in srgb, var(--primary-color) 20%, var(--border-color) 80%);
            background: color-mix(in srgb, var(--surface-color) 95%, rgba(59, 130, 246, 0.04));
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
        }
        .lf-filters .range-field span {
            font-weight: 700;
            color: color-mix(in srgb, var(--text-color) 86%, var(--muted-color) 14%);
            white-space: nowrap;
        }
        .lf-filters .range-field input[type="date"] {
            border: none;
            padding: 8px 0;
            background: transparent;
            width: 100%;
            outline: none;
            font-weight: 600;
            color: color-mix(in srgb, var(--text-color) 90%, var(--muted-color) 10%);
        }
        .lf-filters select,
        .lf-filters input[type="date"] {
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid color-mix(in srgb, var(--primary-color) 20%, var(--border-color) 80%);
            background: color-mix(in srgb, var(--surface-color) 95%, rgba(59, 130, 246, 0.04));
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
            font-weight: 600;
            color: color-mix(in srgb, var(--text-color) 90%, var(--muted-color) 10%);
            appearance: none;
            background-image: linear-gradient(45deg, transparent 50%, var(--primary-color) 50%), linear-gradient(135deg, var(--primary-color) 50%, transparent 50%);
            background-position: calc(100% - 18px) calc(50% - 4px), calc(100% - 12px) calc(50% - 4px);
            background-size: 6px 6px, 6px 6px;
            background-repeat: no-repeat;
        }
        .lf-filters select:focus,
        .lf-filters input[type="date"]:focus,
        .lf-filters .input-icon:focus-within {
            border-color: color-mix(in srgb, var(--primary-color) 70%, var(--border-color) 30%);
            box-shadow: 0 0 0 4px var(--focus-ring), 0 12px 24px rgba(59, 130, 246, 0.08);
        }
        .lf-filters .filter-actions {
            justify-content: center;
            padding: 0;
            background: transparent;
            border: none;
            box-shadow: none;
            align-self: end;
        }
        .lf-filters .filter-actions .actions-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .lf-filters .filter-actions .btn {
            margin: 0;
        }
        .lf-filters .btn-clean {
            padding: 8px 12px;
            font-weight: 600;
            min-width: 120px;
        }
        .lf-filters .btn-search {
            padding: 12px 18px;
            font-weight: 700;
            min-width: 180px;
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.15);
        }
        .lf-filters .align-end {
            align-items: flex-end;
            justify-content: flex-end;
        }
        .lf-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
        }
        .lf-summary-card {
            padding: 12px;
            display: grid;
            gap: 6px;
            border-left: 4px solid color-mix(in srgb, var(--primary-color) 22%, transparent);
            background: color-mix(in srgb, var(--surface-color) 90%, rgba(255, 255, 255, 0.05));
        }
        .lf-summary-card.highlight {
            border: 1px solid color-mix(in srgb, var(--primary-color) 40%, rgba(255, 255, 255, 0.1));
            box-shadow: 0 10px 26px rgba(34, 197, 94, 0.18);
        }
        .lf-summary-label {
            font-weight: 600;
            color: var(--text-light);
        }
        .lf-summary-value {
            font-size: 1.75rem;
            font-weight: 700;
        }
        .lf-summary-detail {
            color: var(--text-light);
            font-size: 0.95rem;
        }
        .lf-table .table-subtitle {
            margin-top: 4px;
            color: var(--text-light);
        }

            z-index: 1;

            content: "";

            top: 10px;
            bottom: 10px;

        #tabela-achados thead th:first-child {
            border-top-left-radius: 14px;
            border-bottom-left-radius: 14px;
        }
        #tabela-achados tbody td:last-child,
        #tabela-achados thead th:last-child {
            border-top-right-radius: 14px;
            border-bottom-right-radius: 14px;
        }
        .lf-table .table-empty {

            text-align: center;
            color: var(--text-light);
        }
        .lf-table .loader {

            height: 28px;
            border: 2px solid color-mix(in srgb, var(--primary-color) 24%, transparent);
            border-right-color: transparent;
            border-bottom-color: transparent;
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 0.7s linear infinite;
        }
        .lf-actions {
            display: flex;
            gap: 8px;
        }
        .lf-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 14px;
            background: color-mix(in srgb, var(--surface-color) 88%, rgba(255, 255, 255, 0.08));
            border: 1px solid color-mix(in srgb, var(--surface-color) 55%, transparent);
        }
        .lf-actions {
            flex-wrap: wrap;
        }
        .lf-actions .btn {
            white-space: nowrap;
            padding: 10px 14px;
            border-radius: 12px;

            justify-content: center;
            gap: 8px;

                gap: 10px;

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }

        .mov-item-flag.remocao-indicador {
            background: color-mix(in srgb, var(--danger-color) 12%, var(--surface-color) 88%);
            color: var(--danger-dark);
            border: 1px dashed color-mix(in srgb, var(--danger-color) 35%, transparent);
            margin-left: 8px;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        /* Garante que inputs de arquivo usados em modais fiquem ocultos
           quando estilizados por um botão customizado. */
        .swal2-popup input[type="file"].sr-only {
            position: absolute !important;
            width: 1px !important;
            height: 1px !important;
            padding: 0 !important;
            margin: -1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            white-space: nowrap !important;
            border: 0 !important;

        * {

            padding: 0;

            overflow-x: hidden;

        }
        body.modal-open {
            overflow: hidden;
            touch-action: auto;
        }
        .fa-user-clock, .fas.fa-user-clock {

        }
        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            height: 100vh;
            position: fixed;
            overflow-y: auto;

        .brand-name {

            font-weight: 400;
            font-style: normal;
            letter-spacing: 0.04em;
        }
        .brand-subtitle {
            font-weight: 400;
            font-style: normal;

        .sidebar-title {

        .sidebar-header p {

        .sidebar-menu {

        .sidebar-menu ul {

        .sidebar-menu li {

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;

        .sidebar-menu a:hover {

        .sidebar-menu span {

        }
        .sidebar-menu i {

            text-align: center;

        .selector-control.open,
